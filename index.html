<style>
.dash-hero{background:var(--grad1);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:var(--yellow);opacity:.06}
.hero-date{font-family:'Bebas Neue';font-size:28px;color:var(--yellow);letter-spacing:3px;line-height:1}
.hero-sub{font-size:10px;color:#9CA3AF;font-family:'DM Mono';margin-top:2px;letter-spacing:1px}
.hero-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.hero-badge{font-size:9px;font-family:'DM Mono';padding:3px 10px;border-radius:12px;font-weight:600}
.hero-badge.live{background:#DCFCE7;color:var(--green)}.hero-badge.warn{background:#FEF9C3;color:#92400E}.hero-badge.err{background:#FEE2E2;color:var(--red)}
.oee-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.oee-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.oee-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.oee-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow)}
.oee-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oee-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono'}
.oee-turno-badge{font-size:8px;font-family:'DM Mono';padding:2px 8px;border-radius:10px;font-weight:700}
.oee-t-T1{background:#E0E7FF;color:var(--blue)}
.oee-t-T2{background:#FEF3C7;color:#92400E}
.oee-t-T3{background:#E9D5FF;color:var(--purple)}
.oee-val{font-family:'Bebas Neue';font-size:36px;letter-spacing:1px;line-height:1}
.oee-sub{font-size:9px;color:var(--muted);font-family:'DM Mono';margin-top:4px}
.oee-bar{height:6px;background:var(--lg);border-radius:3px;margin-top:8px;overflow:hidden}
.oee-bar-fill{height:100%;border-radius:3px;transition:width .6s}

.prod-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono';letter-spacing:1px;text-transform:uppercase}
.prod-sub{font-size:10px;color:var(--muted);margin-top:4px}
.manut-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-family:'DM Mono';padding:3px 10px;border-radius:12px;font-weight:600;background:#FEE2E2;color:var(--red)}

/* LOSS — mass balance */
.loss-total-card{background:var(--grad1);border-radius:20px;padding:22px;margin-bottom:14px;color:var(--white);position:relative;overflow:hidden}
.loss-total-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--red);opacity:.08}
.loss-total-lbl{font-size:10px;font-family:'DM Mono';color:#9CA3AF;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.loss-total-val{font-family:'Bebas Neue';font-size:56px;color:var(--yellow);letter-spacing:2px;line-height:1}
.loss-total-sub{font-size:11px;color:#D1D5DB;margin-top:4px;font-family:'DM Mono'}
.loss-total-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.loss-total-item{background:rgba(255,255,255,0.06);border-radius:10px;padding:12px}
.loss-total-item-v{font-family:'Bebas Neue';font-size:22px;line-height:1;color:var(--yellow)}
.loss-total-item-l{font-size:9px;color:#9CA3AF;font-family:'DM Mono';letter-spacing:1px;margin-top:4px;text-transform:uppercase}

.mb-line-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}
.mb-line-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.mb-line-name{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;color:var(--ink)}
.mb-line-badges{display:flex;gap:4px;flex-wrap:wrap}
.mb-diagram{display:grid;grid-template-columns:1fr 140px 1fr;gap:14px;align-items:center;margin:12px 0;min-height:180px}
.mb-inputs,.mb-outputs{display:flex;flex-direction:column;gap:8px}
.mb-node{background:var(--lg);border:1px solid var(--border);border-radius:10px;padding:10px;position:relative}
.mb-node-lbl{font-size:8px;font-family:'DM Mono';color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.mb-node-val{font-family:'Bebas Neue';font-size:18px;color:var(--ink);line-height:1;margin-top:2px}
.mb-node-sub{font-size:9px;color:var(--muted);font-family:'DM Mono';margin-top:2px}
.mb-node.input{border-left:3px solid var(--blue)}
.mb-node.output{border-left:3px solid var(--green)}
.mb-node.loss{border-left:3px solid var(--red);background:#FEF2F2}
.mb-center-box{background:linear-gradient(135deg,#0C0C0C 0%,#1E293B 100%);color:var(--white);border-radius:14px;padding:18px 12px;text-align:center;position:relative}
.mb-center-title{font-family:'Bebas Neue';font-size:18px;color:var(--yellow);letter-spacing:2px;line-height:1}
.mb-center-sub{font-size:9px;color:#9CA3AF;font-family:'DM Mono';margin-top:4px;letter-spacing:1px}
.mb-center-pct{font-family:'Bebas Neue';font-size:32px;color:var(--yellow);line-height:1;margin-top:10px}
.mb-losses-bottom{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px;padding-top:14px;border-top:1px dashed var(--border)}
.mb-loss-item{text-align:center;background:#FEF2F2;border-radius:8px;padding:8px 4px}
.mb-loss-item-v{font-family:'Bebas Neue';font-size:16px;color:var(--red);line-height:1}
.mb-loss-item-l{font-size:8px;color:var(--muted);font-family:'DM Mono';margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.mb-pct-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.mb-pct-item{background:var(--lg);border-radius:10px;padding:10px;display:flex;justify-content:space-between;align-items:baseline}
.mb-pct-lbl{font-size:10px;color:var(--muted);font-family:'DM Mono';text-transform:uppercase}
.mb-pct-val{font-family:'Bebas Neue';font-size:22px}
.loss-comment-mb{font-size:10px;color:var(--muted);font-style:italic;margin-top:8px;padding:6px 10px;background:var(--lg);border-radius:8px}

@media(max-width:600px){
  .oee-strip{grid-template-columns:1fr 1fr}
  .prod-strip{grid-template-columns:1fr 1fr}
  .loss-total-grid{grid-template-columns:1fr 1fr 1fr}
  .hero-date{font-size:22px}
  .mb-diagram{grid-template-columns:1fr;gap:8px}
  .mb-center-box{padding:14px}
  .loss-total-val{font-size:44px}
}
</style>

<div class="hdr">
  <div class="logo"><div class="logo-bar"></div><div><div style="display:flex;align-items:baseline"><span class="logo-title">ODARA</span><span style="color:#9CA3AF;font-size:11px;letter-spacing:1px;margin-left:6px">PQCDSM</span></div><span class="logo-tag">GESTÃO VISUAL DA PRODUÇÃO</span></div></div>

</div>

<div style="background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:100">

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">

    <div class="modal-hdr"><div><div class="modal-title" id="oee-modal-title"></div><div class="modal-sub" id="oee-modal-sub"></div></div><button class="modal-close" onclick="closeOeeModal()">×</button></div>
    <div class="modal-body"><canvas id="oee-modal-chart" style="max-height:320px"></canvas><div id="oee-modal-stats" style="margin-top:16px"></div></div>

<script src="shared.js"></script>
<script>
let allEntries=[],fltDate=today(),fltLine='ALL';
let modalPilar=null,modalPeriod='semana',modalCharts=[],dashCharts={};
let pesagensHoje=[],prodUnit='alf',oeeModalChart=null;

function setLine(l,el){fltLine=l;document.querySelectorAll('#line-pills .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderDash();}
function onDateChange(){fltDate=document.getElementById('flt-date').value||today();loadPesagens();}
async function loadPesagens(){try{pesagensHoje=await sbQuery('pesagens','select=*&ponto=eq.final&data=eq.'+fltDate);}catch(e){pesagensHoje=[];}renderDash();}

async function loadAll(){
  document.getElementById('hdr-cnt').textContent='carregando…';
  try{
    await sbGetConfig();
    allEntries=(await sbQuery('pqcdsm','select=*&order=data.desc,created_at.desc&limit=1000')).map(norm);
    pesagensHoje=await sbQuery('pesagens','select=*&ponto=eq.final&data=eq.'+fltDate);
    const tc=activeEntries(allEntries).filter(e=>e.data===today()).length;
    document.getElementById('hdr-cnt').textContent=tc+' registro'+(tc!==1?'s':'')+' hoje';
    document.getElementById('footer-src').textContent='Supabase · '+allEntries.length+' reg';
  }catch(err){allEntries=[];document.getElementById('hdr-cnt').textContent='erro';showToast('❌ '+err.message,'err');}
  renderDash();
}

// ══ SOBREPESO AUTO (das pesagens) ══
function calcSobrepesoLinha(ln){
  const lnP=pesagensHoje.filter(p=>p.linha===ln);if(!lnP.length)return 0;
  const bySku={};
  lnP.forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!bySku[k])bySku[k]={gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>bySku[k].weights.push(v));});
  let tot=0;
  // Alf embalados daquela linha no dia
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===fltDate&&e.linha===ln);
  Object.entries(bySku).forEach(([k,sk])=>{
    if(!sk.weights.length)return;
    const mean=sk.weights.reduce((a,b)=>a+b,0)/sk.weights.length;
    const overPct=mean>sk.gram?(mean-sk.gram)/sk.gram:0;
    // Buscar quantidade de alfajores embalados para este SKU (ou fallback realUnid)
    let alfSku=0;
    lnEntries.forEach(e=>{
      const sp=e.embalagens&&e.embalagens.length?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');
      if(sp&&sp.length)sp.forEach(s=>{if(s.sku===k.split('||')[0])alfSku+=(s.real||0);});
    });
    if(!alfSku){alfSku=lnEntries.reduce((s,e)=>s+(e.realUnid||0),0);}
    tot+=(overPct*alfSku*sk.gram)/1000;
  });
  return +tot.toFixed(2);
}

// ══ OEE: calcula por LINHA + TURNO ══
function calcOeeLinhaTurno(entries,linha,turno){
  const teo=OEE_TEORICO[linha];if(!teo)return null;
  const lnE=entries.filter(e=>e.linha===linha&&e.turno===turno);
  if(!lnE.length)return null;
  // Usar soma de reais de embalagem quando houver, senão realUnid
  let real=0;
  lnE.forEach(e=>{
    if(e.embalagens&&e.embalagens.length){real+=e.embalagens.reduce((s,x)=>s+(x.real||0),0);}
    else{real+=(e.realUnid||0);}
  });
  const manutH=lnE.reduce((s,e)=>s+(e.paradaManutMin||0),0)/60;
  const hLiq={T1:teo.horasLiqT1,T2:teo.horasLiqT2,T3:teo.horasLiqT3||teo.horasLiqT1}[turno]||teo.horasLiqT1;
  const availH=Math.max(hLiq-manutH,0.1);
  const teoMax=teo.velNominal*availH;
  const oee=teoMax>0?(real/teoMax)*100:0;
  return{oee:+oee.toFixed(1),real,teoMax:Math.round(teoMax),availH:+availH.toFixed(1),manutH:+manutH.toFixed(1),velNom:teo.velNominal,hLiq};
}

// ══ Productivity por linha (dia) ══
function calcProd(entries,linha){
  const lnE=entries.filter(e=>(linha==='ALL'||e.linha===linha));
  if(!lnE.length)return null;
  const turnos=new Set(lnE.map(e=>e.turno));
  const teo=OEE_TEORICO[linha]||{horasLiqT1:6.8,horasLiqT2:6.8,horasLiqT3:6.8};
  let hLiqTotal=teo.horasLiqT1;
  if(turnos.has('T2'))hLiqTotal+=teo.horasLiqT2;
  if(turnos.has('T3'))hLiqTotal+=teo.horasLiqT3||teo.horasLiqT1;

  // Use embalagens.real when available
  let totAlf=0,totKg=0;
  lnE.forEach(e=>{
    if(e.embalagens&&e.embalagens.length){
      e.embalagens.forEach(x=>{totAlf+=(x.real||0);totKg+=(x.real||0)*(x.gram||0)/1000;});
    }else{
      totAlf+=(e.realUnid||0);
      const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{real:e.realUnid,gram:e.skuGram}];
      sp.forEach(s=>{totKg+=(s.real||0)*(s.gram||0)/1000;});
    }
  });
  const totPres=lnE.reduce((s,e)=>s+(e.presentes||0),0);
  if(!totPres)return null;
  if(totKg===0)totKg=totAlf*0.05;
  const alfPH=totAlf/(totPres*hLiqTotal);
  const kgPH=totKg/(totPres*hLiqTotal);
  return{alfPH:+alfPH.toFixed(1),kgPH:+kgPH.toFixed(2),totalAlf:totAlf,totalKg:+totKg.toFixed(1),pres:totPres,hLiqTotal,turnos:[...turnos]};
}

// ══ Perdas por linha (novo balanço de massa) ══
function lossLinha(flt,ln){
  const lnE=flt.filter(e=>e.linha===ln);
  if(!lnE.length)return null;
  const varrDos=+lnE.reduce((s,e)=>s+(e.perdaVarrDosKg||0),0).toFixed(1);
  const varrCob=+lnE.reduce((s,e)=>s+(e.perdaVarrCobKg||0),0).toFixed(1);
  const varrBisc=+lnE.reduce((s,e)=>s+(e.perdaVarrBiscKg||0),0).toFixed(1);
  const varrTotal=+(varrDos+varrCob+varrBisc).toFixed(1);
  const quebraFornec=+lnE.reduce((s,e)=>s+(e.perdaQuebraFornecKg||0),0).toFixed(1);
  const rejeito=+lnE.reduce((s,e)=>s+(e.perdaRejeitoDosKg||0),0).toFixed(1);
  const bopp=+lnE.reduce((s,e)=>s+(e.perdaBoppKg||0),0).toFixed(1);
  const sobrepeso=calcSobrepesoLinha(ln);
  // Kg produzidos (embalagens ou skusProd ou realUnid)
  let kgDos=0,kgEmb=0,alfEmb=0;
  lnE.forEach(e=>{
    if(e.dosagens&&e.dosagens.length)e.dosagens.forEach(d=>{kgDos+=(d.real||0)*(d.gram||0)/1000;});
    if(e.embalagens&&e.embalagens.length)e.embalagens.forEach(x=>{kgEmb+=(x.real||0)*(x.gram||0)/1000;alfEmb+=(x.real||0);});
    if((!e.embalagens||!e.embalagens.length)&&!((e.dosagens||[]).length)){
      const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{real:e.realUnid,gram:e.skuGram}];
      sp.forEach(s=>{const kg=(s.real||0)*(s.gram||0)/1000;if(s.tipo==='dosagem')kgDos+=kg;else{kgEmb+=kg;alfEmb+=(s.real||0);}});
    }
  });
  const kgTotal=+(kgDos+kgEmb).toFixed(1);
  // % matéria-prima: (varredura + sobrepeso + rejeito + quebra) / kg produzidos (dosado+coberto)
  const mpKg=+(varrTotal+sobrepeso+rejeito+quebraFornec).toFixed(1);
  const mpPct=kgTotal>0?+((mpKg/kgTotal)*100).toFixed(2):0;
  // % bopp: perda_bopp / (flowpack_peso * alf_emb)
  const sampleE=lnE[0];
  let fpTp='classico';
  if(sampleE){
    const g=sampleE.skuGram||(sampleE.embalagens&&sampleE.embalagens[0]?sampleE.embalagens[0].gram:0);
    if(g<=25)fpTp='mini';else if(g<50)fpTp='crocante';else if(g==45)fpTp='zero';else fpTp='classico';
    // Override with explicit tipoProduto when available
    if(sampleE.tipoProduto)fpTp=sampleE.tipoProduto;
  }
  const fpPeso=FLOWPACK_PESO[fpTp]||0.5;
  const flowpackKg=+(fpPeso*alfEmb/1000).toFixed(2);
  const boppPct=flowpackKg>0?+((bopp/flowpackKg)*100).toFixed(2):0;
  return{linha:ln,varrDos,varrCob,varrBisc,varrTotal,quebraFornec,rejeito,bopp,sobrepeso,kgDos:+kgDos.toFixed(1),kgEmb:+kgEmb.toFixed(1),kgTotal,alfEmb,mpKg,mpPct,flowpackKg,boppPct,fpTp,fpPeso};
}

// ══ RENDER ══
function renderDash(){
  fltDate=document.getElementById('flt-date').value||today();
  document.getElementById('hdr-date').textContent=new Date(fltDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const filtered=activeEntries(allEntries).filter(e=>e.data===fltDate);
  const flt=fltLine==='ALL'?filtered:filtered.filter(e=>e.linha===fltLine);
  if(!flt.length){document.getElementById('dash-body').innerHTML='<div class="empty" style="margin-top:20px"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700;margin-bottom:4px">Nenhum registro em '+new Date(fltDate+'T12:00').toLocaleDateString('pt-BR')+'</div><a href="entrada.html" style="display:inline-block;margin-top:14px;background:var(--yellow);border-radius:20px;padding:9px 20px;font-weight:700;font-size:12px;color:var(--black)">Abrir entrada →</a></div>';return;}
  let h='';

  // Aggregate KPIs
  const P_u=avg(flt,e=>e.metaUnid>0?pct(e.realUnid,e.metaUnid):null),P_c=avg(flt,e=>e.metaCarr>0?pct(e.realCarr,e.metaCarr):null),P=P_u!==null?P_u:P_c;
  const Q=flt.reduce((s,e)=>s+totalNCs(e),0),S=flt.reduce((s,e)=>s+totalIncs(e),0);
  const M=avg(flt,e=>e.totalColab>0?pct(e.presentes,e.totalColab):null);
  const padStats=(()=>{let ok=0,dl=0,dg=0,tot=0;flt.forEach(e=>{const p=e.padroes||{};Object.values(p).forEach(v=>{tot++;if(v==='c')ok++;else if(v==='dl')dl++;else if(v==='dg')dg++;});});return{ok,dl,dg,tot,pct:tot?pct(ok,tot):null};})();

  const turnos=new Set(flt.map(e=>e.turno));
  const hasManut=flt.some(e=>e.paradaManut);
  const totalManutMin=flt.reduce((s,e)=>s+(e.paradaManutMin||0),0);

  // Hero
  h+='<div class="dash-hero"><div class="hero-date">'+new Date(fltDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}).toUpperCase()+'</div>';
  h+='<div class="hero-sub">'+(fltLine==='ALL'?'FÁBRICA':'LINHA '+fltLine.replace('L',''))+' · Turnos: '+[...turnos].sort().join(', ')+'</div>';
  h+='<div class="hero-badges"><span class="hero-badge live">● '+flt.length+' reg</span>';
  if(hasManut)h+='<span class="hero-badge warn">🔧 '+totalManutMin+'min manut</span>';
  if(S>0)h+='<span class="hero-badge err">⚠ '+S+' seg</span>';
  h+='</div></div>';

  // Perda total do dia
  const lines=fltLine==='ALL'?['L1','L2','L3']:[fltLine];
  const lossByLine=lines.map(ln=>lossLinha(flt,ln)).filter(x=>x);
  const totalVarr=+lossByLine.reduce((s,l)=>s+l.varrTotal,0).toFixed(1);
  const totalSobr=+lossByLine.reduce((s,l)=>s+l.sobrepeso,0).toFixed(1);
  const totalBopp=+lossByLine.reduce((s,l)=>s+l.bopp,0).toFixed(1);
  const perdaTotal=+(totalVarr+totalSobr+totalBopp).toFixed(1);

  // KPIs
  h+='<div class="section-lbl">PQCDSM</div><div class="kpi-grid">';
  h+=KC('P','Produção',P,'%','meta: '+METAS.P+'%',kpiColor('P',P),'#2563EB');
  h+=KC('Q','Qualidade',Q,' NCs','meta: ≤'+METAS.Q,kpiColor('Q',Q),'#D97706');
  h+=KC('C','Perdas',perdaTotal,' kg','varredura + sobrepeso + BOPP',perdaTotal>50?'#CC2929':perdaTotal>20?'#C2410C':'#15803D','#DC2626');
  h+=KC('S','Segurança',S,' ev','meta: '+METAS.S,kpiColor('S',S),'#7C3AED');
  h+=KC('M','Moral',M,'%','meta: '+METAS.M+'%',kpiColor('M',M),'#EA580C');
  h+=KC('PAD','Padrões',padStats.pct,'%',padStats.dl+' leves · '+padStats.dg+' graves',kpiColor('PAD',padStats.pct),'#0369A1');
  h+='</div>';

  // ══ OEE por linha+turno ══
  const oeeCards=[];
  lines.forEach(ln=>{
    ['T1','T2','T3'].forEach(t=>{
      const o=calcOeeLinhaTurno(flt,ln,t);
      if(o)oeeCards.push({ln,turno:t,...o});
    });
  });
  if(oeeCards.length){
    h+='<div class="section-lbl">OEE APROXIMADO · clique para ver série histórica</div><div class="oee-strip">';
    oeeCards.forEach(o=>{
      const meta=TARGETS_OEE[o.ln]||60;
      const col=o.oee>=meta?'var(--green)':o.oee>=meta*0.7?'var(--orange)':'var(--red)';
      h+='<div class="oee-card" onclick="openOeeModal(\''+o.ln+'\',\''+o.turno+'\')">';
      h+='<div class="oee-hdr"><span class="oee-lbl">'+o.ln+'</span><span class="oee-turno-badge oee-t-'+o.turno+'">'+o.turno+'</span></div>';
      h+='<div class="oee-val" style="color:'+col+'">'+o.oee+'%</div>';
      h+='<div class="oee-sub">Real: '+o.real.toLocaleString('pt-BR')+' / '+o.teoMax.toLocaleString('pt-BR')+' · meta '+meta+'%</div>';
      h+='<div class="oee-sub">Disp: '+o.availH+'h · Vel.nom '+o.velNom.toLocaleString('pt-BR')+'/h'+(o.manutH>0?' · 🔧 '+o.manutH+'h':'')+'</div>';
      h+='<div class="oee-bar"><div class="oee-bar-fill" style="width:'+Math.min(o.oee,100)+'%;background:'+col+'"></div></div></div>';
    });
    // Fábrica (só quando estamos em ALL)
    if(fltLine==='ALL'&&oeeCards.length>1){
      const tR=oeeCards.reduce((s,o)=>s+o.real,0),tT=oeeCards.reduce((s,o)=>s+o.teoMax,0);
      const oG=tT>0?+((tR/tT)*100).toFixed(1):0;
      const metaF=TARGETS_OEE.fabrica||60;
      const col=oG>=metaF?'var(--green)':oG>=metaF*0.7?'var(--orange)':'var(--red)';
      h+='<div class="oee-card" style="border-color:var(--yellow);cursor:default" onclick="openOeeModal(\'FAB\',\'ALL\')">';
      h+='<div class="oee-hdr"><span class="oee-lbl">FÁBRICA</span><span class="oee-turno-badge" style="background:#FEF3C7;color:#92400E">★ TODOS</span></div>';
      h+='<div class="oee-val" style="color:'+col+'">'+oG+'%</div>';
      h+='<div class="oee-sub">'+tR.toLocaleString('pt-BR')+' / '+tT.toLocaleString('pt-BR')+' · meta '+metaF+'%</div>';
      h+='<div class="oee-bar"><div class="oee-bar-fill" style="width:'+Math.min(oG,100)+'%;background:'+col+'"></div></div></div>';
    }
    h+='</div>';
  }

  // ══ Produtividade ══
  const prodR=lines.map(ln=>{const p=calcProd(flt,ln);return p?{ln,...p}:null;}).filter(x=>x);
  if(prodR.length){
    h+='<div class="section-lbl" style="display:flex;justify-content:space-between;align-items:center">PRODUTIVIDADE';
    h+='<div class="toggle-row" style="margin-left:auto"><button class="toggle-btn '+(prodUnit==='alf'?'active':'')+'" onclick="prodUnit=\'alf\';renderDash()">alf/p·h</button><button class="toggle-btn '+(prodUnit==='kg'?'active':'')+'" onclick="prodUnit=\'kg\';renderDash()">kg/p·h</button></div></div>';
    h+='<div class="prod-strip">';
    prodR.forEach(p=>{
      const val=prodUnit==='alf'?p.alfPH:p.kgPH,unit=prodUnit==='alf'?'alf/p·h':'kg/p·h';
      const tgt=TARGETS_PROD[p.ln]||{alfPH:0,kgPH:0};
      const meta=prodUnit==='alf'?tgt.alfPH:tgt.kgPH;
      const col=meta&&val>=meta?'var(--green)':meta&&val>=meta*0.85?'var(--orange)':meta?'var(--red)':'var(--blue)';
      h+='<div class="prod-card"><div class="prod-lbl">'+p.ln+(p.turnos.length>1?' · '+p.turnos.sort().join('+'):'')+'</div><div class="prod-val" style="color:'+col+'">'+val+'</div><div class="prod-lbl">'+unit+'</div>';
      h+='<div class="prod-sub">'+p.pres+' pessoas · '+p.totalAlf.toLocaleString('pt-BR')+' alf'+(meta?' · meta '+meta:'')+'</div></div>';
    });
    h+='</div>';
  }

  // ══ PERDAS — QUADRO TOTAL + BALANÇO POR LINHA ══
  h+='<div class="section-lbl">PERDAS — BALANÇO DE MASSA</div>';
  h+='<div class="loss-total-card"><div class="loss-total-lbl">PERDA TOTAL DO DIA</div>';
  h+='<div class="loss-total-val">'+perdaTotal+' kg</div>';
  h+='<div class="loss-total-sub">Varredura + Sobrepeso + BOPP · OMIE = entrada − (saídas + perdas)</div>';
  h+='<div class="loss-total-grid">';
  h+='<div class="loss-total-item"><div class="loss-total-item-v">'+totalVarr+' kg</div><div class="loss-total-item-l">Varredura</div></div>';
  h+='<div class="loss-total-item"><div class="loss-total-item-v">'+totalSobr+' kg</div><div class="loss-total-item-l">Sobrepeso</div></div>';
  h+='<div class="loss-total-item"><div class="loss-total-item-v">'+totalBopp+' kg</div><div class="loss-total-item-l">BOPP</div></div>';
  h+='</div></div>';

  // Balanço de massa por linha
  lossByLine.forEach(l=>{
    h+='<div class="mb-line-card">';
    h+='<div class="mb-line-hdr"><span class="mb-line-name">'+l.linha+' · BALANÇO DE MASSA</span>';
    h+='<div class="mb-line-badges"><span class="hero-badge" style="background:var(--lg);color:var(--muted)">'+l.kgTotal.toFixed(1)+' kg prod.</span></div></div>';

    // Diagram: inputs → center → outputs
    h+='<div class="mb-diagram">';
    // Inputs (left)
    h+='<div class="mb-inputs">';
    h+='<div class="mb-node input"><div class="mb-node-lbl">Entrada · Biscoito</div><div class="mb-node-val">'+((l.kgDos*0.4)+(l.quebraFornec)).toFixed(1)+' kg</div><div class="mb-node-sub">inclui '+l.quebraFornec+'kg quebra fornec.</div></div>';
    h+='<div class="mb-node input"><div class="mb-node-lbl">Entrada · Doce de Leite</div><div class="mb-node-val">'+((l.kgDos*0.6)+(l.rejeito)).toFixed(1)+' kg</div><div class="mb-node-sub">inclui '+l.rejeito+'kg rejeito</div></div>';
    h+='</div>';
    // Center box
    h+='<div class="mb-center-box"><div class="mb-center-title">DOSAGEM & EMB.</div><div class="mb-center-sub">LINHA '+l.linha.replace('L','')+'</div>';
    h+='<div class="mb-center-pct">'+l.mpPct+'%</div><div style="font-size:8px;color:#9CA3AF;font-family:\'DM Mono\'">% perda MP</div></div>';
    // Outputs (right)
    h+='<div class="mb-outputs">';
    h+='<div class="mb-node output"><div class="mb-node-lbl">Saída · Alfajor Dosado</div><div class="mb-node-val">'+l.kgDos.toFixed(1)+' kg</div><div class="mb-node-sub">processo intermediário</div></div>';
    h+='<div class="mb-node output"><div class="mb-node-lbl">Saída · Produto Embalado</div><div class="mb-node-val">'+l.kgEmb.toFixed(1)+' kg</div><div class="mb-node-sub">'+l.alfEmb.toLocaleString('pt-BR')+' alfajores</div></div>';
    h+='<div class="mb-node loss"><div class="mb-node-lbl">Sobrepeso / Sobredosagem</div><div class="mb-node-val">'+l.sobrepeso+' kg</div><div class="mb-node-sub">calc. das pesagens</div></div>';
    h+='</div></div>';

    // Losses grid bottom
    h+='<div class="mb-losses-bottom">';
    h+='<div class="mb-loss-item"><div class="mb-loss-item-v">'+l.varrBisc+'</div><div class="mb-loss-item-l">Varr. Biscoito</div></div>';
    h+='<div class="mb-loss-item"><div class="mb-loss-item-v">'+l.varrDos+'</div><div class="mb-loss-item-l">Varr. Dosado</div></div>';
    h+='<div class="mb-loss-item"><div class="mb-loss-item-v">'+l.varrCob+'</div><div class="mb-loss-item-l">Varr. Coberto</div></div>';
    h+='<div class="mb-loss-item"><div class="mb-loss-item-v">'+l.quebraFornec+'</div><div class="mb-loss-item-l">Quebra Forn.</div></div>';
    h+='<div class="mb-loss-item"><div class="mb-loss-item-v">'+l.rejeito+'</div><div class="mb-loss-item-l">Rej. Dosado</div></div>';
    h+='<div class="mb-loss-item"><div class="mb-loss-item-v">'+l.bopp+'</div><div class="mb-loss-item-l">BOPP</div></div>';
    h+='</div>';

    // Pct row
    const mpCol=l.mpPct<=2?'var(--green)':l.mpPct<=5?'var(--orange)':'var(--red)';
    const boppCol=l.boppPct<=5?'var(--green)':l.boppPct<=10?'var(--orange)':'var(--red)';
    h+='<div class="mb-pct-row">';
    h+='<div class="mb-pct-item"><span class="mb-pct-lbl">% Perda MP</span><span class="mb-pct-val" style="color:'+mpCol+'">'+l.mpPct+'%</span></div>';
    h+='<div class="mb-pct-item"><span class="mb-pct-lbl">% Perda BOPP</span><span class="mb-pct-val" style="color:'+boppCol+'">'+l.boppPct+'%</span></div>';
    h+='</div>';

    // Comments
    const comments=flt.filter(e=>e.linha===l.linha&&e.comentarioPerdas).map(e=>e.supervisor+' ('+e.turno+'): '+e.comentarioPerdas);
    comments.forEach(c=>{h+='<div class="loss-comment-mb">💬 '+c+'</div>';});
    h+='</div>';
  });

  // ══ SKU Summary ══
  const skuMap={};flt.forEach(e=>{const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{sku:e.sku,desc:e.skuDesc,meta:e.metaUnid,real:e.realUnid}];sp.forEach(s=>{if(!s.sku)return;if(!skuMap[s.sku])skuMap[s.sku]={desc:s.desc||'',meta:0,real:0};skuMap[s.sku].meta+=(s.meta||0);skuMap[s.sku].real+=(s.real||0);});});
  const skuE=Object.entries(skuMap);
  if(skuE.length){
    h+='<div class="sku-summary"><div class="chart-title">📦 SKUs Produzidos</div><table class="sku-tbl"><thead><tr><th>SKU</th><th>Descrição</th><th style="text-align:right">Meta</th><th style="text-align:right">Real</th><th style="text-align:right">%</th></tr></thead><tbody>';
    skuE.forEach(([cod,v])=>{const p=v.meta>0?pct(v.real,v.meta):null,pc=p===null?'var(--muted)':p>=95?'var(--green)':p>=80?'var(--orange)':'var(--red)';h+='<tr><td style="font-weight:700">'+cod+'</td><td style="font-size:10px;color:var(--muted)">'+v.desc.slice(0,30)+'</td><td style="text-align:right">'+v.meta.toLocaleString('pt-BR')+'</td><td style="text-align:right;font-weight:700">'+v.real.toLocaleString('pt-BR')+'</td><td style="text-align:right;color:'+pc+';font-weight:700">'+(p!==null?p+'%':'—')+'</td></tr>';});
    h+='</tbody></table></div>';
  }

  // Weight status
  const wBySku={};pesagensHoje.filter(p=>fltLine==='ALL'||p.linha===fltLine).forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!wBySku[k])wBySku[k]={sku:p.sku,desc:p.sku_desc||'',gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>wBySku[k].weights.push(v));});
  const wE=Object.values(wBySku);
  if(wE.length){
    h+='<div class="section-lbl">Controle de Peso</div><div class="an-summary">';
    wE.forEach(w=>{
      const ev=w.weights.length>=5?inmetroEval(w.weights,w.gram):{status:'pending'};
      const col=ev.status==='approved'?'green':ev.status==='rejected'?'red':'orange';
      const icon=ev.status==='approved'?'✅':ev.status==='rejected'?'❌':'⏳';
      const overPct=ev.mean&&ev.mean>w.gram?((ev.mean-w.gram)/w.gram*100).toFixed(1):null;
      h+='<div class="an-card '+col+'"><div class="an-lbl">'+icon+' '+w.sku+'</div><div class="an-val">'+(ev.mean?ev.mean+'g':'—')+'</div><div class="an-sub">'+w.weights.length+' pesagens · Qn='+w.gram+'g'+(ev.sd?' · σ='+ev.sd+'g':'')+(overPct?' · <strong style="color:var(--purple)">+'+overPct+'%</strong>':'')+'</div></div>';
    });
    h+='</div>';
  }

  // Deviations (4 item checklist)
  const devs=padDeviations(flt);
  if(devs.length){
    h+='<div class="dev-box"><div class="chart-title" style="color:#92400E">⚠️ Desvios de Padrão ('+devs.length+')</div>';
    devs.forEach(d=>{h+='<div class="dev-item"><div class="dev-dot '+(d.status==='dg'?'grave':'leve')+'"></div><span style="flex:1">'+d.item+(d.comment?' — <em style="color:var(--muted)">'+d.comment+'</em>':'')+'</span></div>';});
    h+='</div>';
  }

  // Insights
  h+='<div class="daily-box"><div class="daily-title">💡 INSIGHTS — REUNIÃO DIÁRIA</div>';
  const ins=[];
  if(P!==null&&P>=METAS.P)ins.push({t:'Produção em '+P.toFixed(1)+'%. Meta atingida!',c:'green'});
  else if(P!==null)ins.push({t:'Produção em '+P.toFixed(1)+'% (meta: '+METAS.P+'%).',c:P>=METAS.P*0.85?'yellow':'red'});
  if(Q===0)ins.push({t:'Zero NCs.',c:'green'});else if(Q>METAS.Q)ins.push({t:Q+' NCs. Verificar modos.',c:'red'});
  if(S>0)ins.push({t:S+' evento(s) de segurança.',c:'red'});else ins.push({t:'Zero eventos de segurança.',c:'green'});
  if(perdaTotal>50)ins.push({t:'Perdas: '+perdaTotal+'kg. Investigar.',c:'red'});
  else if(perdaTotal>20)ins.push({t:'Perdas: '+perdaTotal+'kg. Acompanhar.',c:'yellow'});
  if(totalSobr>5)ins.push({t:'Sobrepeso: '+totalSobr+'kg. Ajustar dosagem.',c:'red'});
  if(totalBopp>0)ins.push({t:'Perda BOPP: '+totalBopp+'kg.',c:'yellow'});
  if(hasManut)ins.push({t:'Parada manut: '+totalManutMin+'min.',c:'yellow'});
  if(padStats.dg>0)ins.push({t:padStats.dg+' desvio(s) grave(s).',c:'red'});
  oeeCards.forEach(o=>{const meta=TARGETS_OEE[o.ln]||60;if(o.oee<meta*0.7)ins.push({t:'OEE '+o.ln+'/'+o.turno+' crítico: '+o.oee+'%.',c:'red'});});
  flt.forEach(e=>{if(e.comentarioP)ins.push({t:'📝 '+e.supervisor+': '+e.comentarioP,c:'blue'});});
  if(!ins.length)ins.push({t:'Dados insuficientes.',c:'yellow'});
  ins.forEach(i=>{h+='<div class="daily-item '+i.c+'">'+i.t+'</div>';});
  h+='</div>';

  document.getElementById('dash-body').innerHTML=h;
}

function KC(p,label,val,unit,sub,color,bg){const d=val!==null?(p==='Q'||p==='S'?Math.round(val)+unit:typeof val==='number'?val.toFixed(1)+unit:val+unit):'–';return '<div class="kpi-card" onclick="openModal(\''+p+'\')"><div class="kpi-hdr"><span class="kpi-lbl">'+label+'</span><span class="kpi-bdg" style="background:'+bg+'">'+p+'</span></div><div class="kpi-val" style="color:'+color+'">'+d+'</div><div class="kpi-sub">'+sub+'</div><div class="kpi-drill">↗ detalhar</div><div class="kpi-bar" style="background:'+color+'"></div></div>';}

// ══ OEE MODAL (time series) ══
function openOeeModal(linha,turno){
  document.getElementById('oee-modal-title').textContent='OEE — '+linha+(turno==='ALL'?' · Fábrica':' · Turno '+turno);
  document.getElementById('oee-modal-sub').textContent='Últimos 30 dias · dados por dia';
  // Build series for last 30 days
  const today=new Date(fltDate+'T12:00'),cut=new Date(today);cut.setDate(cut.getDate()-30);
  const byDate={};
  activeEntries(allEntries).forEach(e=>{
    const d=new Date(e.data+'T12:00');if(d<cut||d>today)return;
    if(linha!=='FAB'&&e.linha!==linha)return;
    if(turno!=='ALL'&&e.turno!==turno)return;
    if(!byDate[e.data])byDate[e.data]={entries:[]};byDate[e.data].entries.push(e);
  });
  const dates=Object.keys(byDate).sort();
  const series=dates.map(d=>{
    if(linha==='FAB'){
      // Sum across lines and turnos
      const linhas=['L1','L2','L3'];let tR=0,tT=0;
      linhas.forEach(ln=>{
        ['T1','T2','T3'].forEach(t=>{
          const o=calcOeeLinhaTurno(byDate[d].entries,ln,t);
          if(o){tR+=o.real;tT+=o.teoMax;}
        });
      });
      return tT>0?+((tR/tT)*100).toFixed(1):null;
    }else{
      const o=calcOeeLinhaTurno(byDate[d].entries,linha,turno);
      return o?o.oee:null;
    }
  });
  const labels=dates.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));
  const meta=linha==='FAB'?(TARGETS_OEE.fabrica||60):(TARGETS_OEE[linha]||60);

  document.getElementById('oee-modal').classList.add('open');
  if(oeeModalChart){try{oeeModalChart.destroy()}catch(e){}}
  setTimeout(()=>{
    const cv=document.getElementById('oee-modal-chart');if(!cv)return;
    oeeModalChart=new Chart(cv,{type:'bar',data:{labels,datasets:[{label:'OEE %',data:series,backgroundColor:series.map(v=>v===null?'#E5E5E0':v>=meta?'#15803D99':v>=meta*0.7?'#C2410C99':'#CC292999'),borderColor:series.map(v=>v===null?'#E5E5E0':v>=meta?'#15803D':v>=meta*0.7?'#C2410C':'#CC2929'),borderWidth:1,borderRadius:3},{type:'line',label:'Meta',data:Array(series.length).fill(meta),borderColor:'#15803D',borderWidth:2,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:8},maxRotation:45}},y:{ticks:{font:{family:'DM Mono',size:9}},min:0}},maintainAspectRatio:true}});
    // Stats
    const vals=series.filter(v=>v!==null);
    const avgV=vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0;
    const maxV=vals.length?Math.max(...vals):0,minV=vals.length?Math.min(...vals):0;
    const atingiu=vals.filter(v=>v>=meta).length;
    document.getElementById('oee-modal-stats').innerHTML='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--ink)">'+avgV+'%</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\';text-transform:uppercase">Média</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--green)">'+maxV+'%</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\';text-transform:uppercase">Máx</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--red)">'+minV+'%</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\';text-transform:uppercase">Mín</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--yellow)">'+atingiu+'/'+vals.length+'</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\';text-transform:uppercase">Dias ≥ meta</div></div>'+
      '</div>';
  },80);
}
function closeOeeModal(){document.getElementById('oee-modal').classList.remove('open');if(oeeModalChart){try{oeeModalChart.destroy()}catch(e){}oeeModalChart=null;}}

// ══ MODAL PQCDSM ══
function openModal(p){modalPilar=p;modalPeriod='semana';document.getElementById('modal-title').textContent={P:'Produção',Q:'Qualidade',C:'Perdas',S:'Segurança',M:'Moral',PAD:'Padrões'}[p];document.getElementById('modal-sub').textContent='Linha: '+(fltLine==='ALL'?'Todas':fltLine);document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('active',i===0));renderModal();document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');modalCharts.forEach(c=>{try{c.destroy()}catch(e){}});modalCharts=[];}
function setMTab(p,el){modalPeriod=p;document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderModal();}
function getMD(){const ref=new Date(fltDate+'T12:00'),cut=new Date(ref);if(modalPeriod==='semana')cut.setDate(cut.getDate()-7);else if(modalPeriod==='mes')cut.setDate(cut.getDate()-30);else cut.setDate(cut.getDate()-365);let d=activeEntries(allEntries).filter(e=>{const dt=new Date(e.data+'T12:00');return dt>=cut&&dt<=ref;});if(fltLine!=='ALL')d=d.filter(e=>e.linha===fltLine);return d.reverse();}
function renderModal(){
  modalCharts.forEach(c=>{try{c.destroy()}catch(e){}});modalCharts=[];
  const data=getMD(),body=document.getElementById('modal-body');
  if(!data.length){body.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);font-size:12px;font-family:\'DM Mono\'">Nenhum registro</div>';return;}
  const grouped={};data.forEach(e=>{if(!grouped[e.data])grouped[e.data]=[];grouped[e.data].push(e);});
  const dates=Object.keys(grouped),labels=dates.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));
  const mf={family:'DM Mono',size:9};let html='<canvas id="mc1" style="max-height:300px"></canvas>';
  if(modalPilar==='P'){
    const vals=Object.values(grouped).map(es=>avg(es,e=>e.metaUnid>0?pct(e.realUnid,e.metaUnid):null));
    body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:[{label:'% Atingimento',data:vals,backgroundColor:'#2563EB66',borderColor:'#2563EB',borderWidth:1,borderRadius:4},{type:'line',label:'Meta',data:Array(vals.length).fill(METAS.P),borderColor:'#15803D',borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{ticks:{font:mf}},y:{ticks:{font:mf}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='C'){
    // Loss types breakdown
    const types=[['Varredura Dosado','perdaVarrDosKg','#F59E0B'],['Varredura Coberto','perdaVarrCobKg','#EC4899'],['Varredura Biscoito','perdaVarrBiscKg','#C2410C'],['Quebra Fornec.','perdaQuebraFornecKg','#DC2626'],['Rejeito','perdaRejeitoDosKg','#7C3AED'],['BOPP','perdaBoppKg','#14B8A6']];
    const ds=types.map(([lbl,key,col])=>({label:lbl,data:dates.map(d=>+grouped[d].reduce((s,e)=>s+(e[key]||0),0).toFixed(1)),backgroundColor:col+'AA',borderRadius:2}));
    body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:ds},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:8}},maxHeight:60}},scales:{x:{stacked:true,ticks:{font:mf}},y:{stacked:true,ticks:{font:mf}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='M'){
    const vals=Object.values(grouped).map(es=>avg(es,e=>e.totalColab>0?pct(e.presentes,e.totalColab):null));
    body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:[{label:'% Presença',data:vals,backgroundColor:'#EA580C66',borderColor:'#EA580C',borderWidth:1,borderRadius:4},{type:'line',label:'Meta',data:Array(vals.length).fill(METAS.M),borderColor:'#15803D',borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{ticks:{font:mf}},y:{ticks:{font:mf}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='Q'){
    const allModes={};data.forEach(e=>(e.ncs||[]).forEach(n=>{allModes[n.mode||n.cat||'Outros']=true;}));
    const mList=Object.keys(allModes),pal=['#D97706','#DC2626','#7C3AED','#2563EB','#059669','#C2410C','#EC4899'];
    const ds=mList.map((m,i)=>({label:m.length>22?m.slice(0,22)+'…':m,data:dates.map(d=>grouped[d].reduce((s,e)=>(e.ncs||[]).reduce((ss,n)=>ss+((n.mode||n.cat||'Outros')===m?(n.qty||0):0),s),0)),backgroundColor:pal[i%pal.length]+'AA',borderRadius:2}));
    body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:ds},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:8}},maxHeight:60}},scales:{x:{stacked:true,ticks:{font:mf}},y:{stacked:true,ticks:{font:mf}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='S'){
    const ds=BYRD_LEVELS.map(lv=>({label:lv,data:dates.map(d=>grouped[d].reduce((s,e)=>(e.incidentes||[]).reduce((ss,i)=>ss+(i.camada===lv?1:0),s),0)),backgroundColor:BYRD_COLORS[lv]+'AA',borderRadius:2}));
    body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:ds},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{stacked:true,ticks:{font:mf}},y:{stacked:true,beginAtZero:true,ticks:{font:mf}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='PAD'){
    const vals=Object.values(grouped).map(es=>{let ok=0,tot=0;es.forEach(e=>{const p=e.padroes||{};Object.values(p).forEach(v=>{tot++;if(v==='c')ok++;});});return tot?pct(ok,tot):null;});
    body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:[{label:'% Conformidade',data:vals,backgroundColor:'#0369A166',borderColor:'#0369A1',borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{ticks:{font:mf}},y:{ticks:{font:mf}}},maintainAspectRatio:true}}));
  }
}

document.getElementById('flt-date').value=today();
renderNav('dia');loadAll();
</script>
