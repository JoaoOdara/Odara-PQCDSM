<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Odara · PQCDSM — Dia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="logo-bar"></div><div><div style="display:flex;align-items:baseline"><span class="logo-title">ODARA</span><span style="color:#9CA3AF;font-size:11px;letter-spacing:1px;margin-left:6px">PQCDSM</span><span id="src-badge" class="src-badge src-off">● carregando…</span></div><span class="logo-tag">GESTÃO VISUAL DA PRODUÇÃO</span></div></div>
  <div class="hdr-right"><span class="hdr-date" id="hdr-date"></span><span class="hdr-cnt" id="hdr-cnt">—</span></div>
</div>
<div class="nav-bar" id="main-nav"></div>

<div style="background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:100">
  <span class="fl" style="margin:0">Data</span>
  <input id="flt-date" class="fi" type="date" style="width:auto" onchange="renderDash()"/>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span class="fl" style="margin:0">Linha</span>
  <div style="display:flex;gap:4px" id="line-pills">
    <button class="pill active" onclick="setLine('ALL',this)">Fábrica</button>
    <button class="pill" onclick="setLine('L1',this)">L1</button>
    <button class="pill" onclick="setLine('L2',this)">L2</button>
    <button class="pill" onclick="setLine('L3',this)">L3</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span style="font-size:10px;color:var(--blue);font-family:'DM Mono';cursor:pointer" onclick="loadAll()">↻</span>
</div>

<div class="content" id="dash-body"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr"><div><div class="modal-title" id="modal-title"></div><div class="modal-sub" id="modal-sub"></div></div><div style="display:flex;gap:6px"><button onclick="exportModalPDF()" style="background:var(--black);color:var(--yellow);border:none;border-radius:8px;padding:6px 12px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Mono'">⬇ PDF</button><button class="modal-close" onclick="closeModal()">×</button></div></div>
    <div class="modal-tabs" id="modal-tabs">
      <button class="mtab active" onclick="setMTab('semana',this)">Semana</button>
      <button class="mtab" onclick="setMTab('mes',this)">Mês</button>
      <button class="mtab" onclick="setMTab('ano',this)">Ano</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="footer"><span>ODARA ALFAJORES · PQCDSM v9.0 · Supabase</span><span id="footer-src">inicializando…</span></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
let allEntries=[],fltDate=today(),fltLine='ALL';
let modalPilar=null,modalPeriod='semana',modalCharts=[],dashCharts={};
let lossUnit='kg',pesagensHoje=[];

function setLine(l,el){fltLine=l;document.querySelectorAll('#line-pills .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderDash();}

async function loadAll(){
  const badge=document.getElementById('src-badge');
  badge.className='src-badge src-off';badge.textContent='● carregando…';
  try{
    await sbGetConfig();
    const raw=await sbQuery('pqcdsm','select=*&order=data.desc,created_at.desc&limit=500');
    allEntries=raw.map(norm);
    // Load today's final pesagens for weight status
    const pRaw=await sbQuery('pesagens','select=*&ponto=eq.final&data=eq.'+fltDate);
    pesagensHoje=pRaw;
    badge.className='src-badge src-live';badge.textContent='● ao vivo';
    const tc=activeEntries(allEntries).filter(e=>e.data===today()).length;
    document.getElementById('hdr-cnt').textContent=tc+' registro'+(tc!==1?'s':'')+' hoje';
    document.getElementById('footer-src').textContent='Supabase · '+allEntries.length+' registros';
  }catch(err){allEntries=[];badge.className='src-badge src-err';badge.textContent='● erro';showToast('❌ '+err.message,'err');}
  renderDash();
}

function renderDash(){
  fltDate=document.getElementById('flt-date').value||today();
  document.getElementById('hdr-date').textContent=new Date(fltDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const filtered=activeEntries(allEntries).filter(e=>e.data===fltDate);
  const flt=fltLine==='ALL'?filtered:filtered.filter(e=>e.linha===fltLine);
  const has=flt.length>0;
  let h='';

  if(!has){
    h='<div class="empty" style="margin-top:20px"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700;margin-bottom:4px">Nenhum registro em '+new Date(fltDate+'T12:00').toLocaleDateString('pt-BR')+'</div><a href="entrada.html" style="display:inline-block;margin-top:14px;background:var(--yellow);border-radius:20px;padding:9px 20px;font-weight:700;font-size:12px;color:var(--black)">Abrir entrada →</a></div>';
    document.getElementById('dash-body').innerHTML=h;return;
  }

  const P_u=avg(flt,e=>e.metaUnid>0?pct(e.realUnid,e.metaUnid):null);
  const P_c=avg(flt,e=>e.metaCarr>0?pct(e.realCarr,e.metaCarr):null);
  const P=P_u!==null?P_u:P_c;
  const Q=flt.reduce((s,e)=>s+totalNCs(e),0);
  const Ckg=+flt.reduce((s,e)=>s+totalPerdasKg(e),0).toFixed(1);
  const Crs=+flt.reduce((s,e)=>s+perdasRS(e),0).toFixed(0);
  const S=flt.reduce((s,e)=>s+totalIncs(e),0);
  const M=avg(flt,e=>e.totalColab>0?pct(e.presentes,e.totalColab):null);
  const padStats=(()=>{let ok=0,dl=0,dg=0,tot=0;flt.forEach(e=>{const p=e.padroes||{};Object.values(p).forEach(v=>{tot++;if(v==='c')ok++;else if(v==='dl')dl++;else if(v==='dg')dg++;});});return{ok,dl,dg,tot,pct:tot?pct(ok,tot):null};})();

  h+='<div class="section-lbl" style="margin-top:12px">PQCDSM — '+new Date(fltDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})+'</div>';

  // KPI Grid
  h+='<div class="kpi-grid">';
  const cVal=lossUnit==='kg'?Ckg:Crs,cUnit=lossUnit==='kg'?' kg':' R$';
  h+=KC('P','Produção',P,'%','meta: '+METAS.P+'%',kpiColor('P',P),'#2563EB');
  h+=KC('Q','Qualidade',Q,' NCs','meta: ≤'+METAS.Q,kpiColor('Q',Q),'#D97706');
  h+=KC('C','Custo',cVal,cUnit,'perdas do dia',kpiColor('C',Ckg),'#DC2626');
  h+=KC('S','Segurança',S,' ev','meta: '+METAS.S,kpiColor('S',S),'#7C3AED');
  h+=KC('M','Moral',M,'%','meta: '+METAS.M+'%',kpiColor('M',M),'#EA580C');
  h+=KC('PAD','Padrões',padStats.pct,'%',padStats.dl+' leves · '+padStats.dg+' graves',kpiColor('PAD',padStats.pct),'#0369A1');
  h+='</div>';

  // Loss toggle
  h+='<div style="display:flex;justify-content:flex-end;margin:-6px 0 8px"><div class="toggle-row"><button class="toggle-btn '+(lossUnit==='kg'?'active':'')+'" onclick="lossUnit=\'kg\';renderDash()">kg</button><button class="toggle-btn '+(lossUnit==='rs'?'active':'')+'" onclick="lossUnit=\'rs\';renderDash()">R$</button></div></div>';

  // Loss breakdown card
  const pDlKg=+flt.reduce((s,e)=>s+(e.perdaDlKg||0),0).toFixed(1);
  const pBiscKg=+flt.reduce((s,e)=>s+(e.perdaBiscoitoKg||0),0).toFixed(1);
  const pRejKg=+flt.reduce((s,e)=>s+(e.perdaRejeitoDosKg||0),0).toFixed(1);
  const pQbrKg=+flt.reduce((s,e)=>s+(e.perdaQuebraKg||0),0).toFixed(1);
  const pDosUn=+flt.reduce((s,e)=>s+(e.perdaDosadoUn||0),0).toFixed(0);
  const pCobUn=+flt.reduce((s,e)=>s+(e.perdaCobertoUn||0),0).toFixed(0);
  const pChoUn=+flt.reduce((s,e)=>s+(e.perdaChocolateUn||0),0).toFixed(0);
  const hasPerdas=(pDlKg+pBiscKg+pRejKg+pQbrKg+pDosUn+pCobUn+pChoUn)>0||Ckg>0;
  if(hasPerdas){
    h+='<div class="form-section" style="padding:14px;margin-bottom:12px"><div class="chart-title">📦 Perdas do Dia — Detalhamento</div>';
    h+='<div class="fg" style="gap:16px"><div><div class="wgt-input-title">Dosagem (kg)</div>';
    [['Doce de leite',pDlKg],['Biscoito',pBiscKg],['Rejeito dosado',pRejKg],['Quebra bolacha',pQbrKg]].forEach(([l,v])=>{if(v>0)h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;font-family:\'DM Mono\'"><span style="color:var(--muted)">'+l+'</span><span style="font-weight:700">'+v+'kg</span></div>';});
    h+='</div><div><div class="wgt-input-title">Cobertura/Embalagem (un)</div>';
    [['Dosado',pDosUn],['Coberto',pCobUn],['Chocolate',pChoUn]].forEach(([l,v])=>{if(v>0)h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;font-family:\'DM Mono\'"><span style="color:var(--muted)">'+l+'</span><span style="font-weight:700">'+v+'un</span></div>';});
    h+='</div></div></div>';
  }

  // SKU Summary
  const skuMap={};flt.forEach(e=>{const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{sku:e.sku,desc:e.skuDesc,meta:e.metaUnid,real:e.realUnid}];sp.forEach(s=>{if(!s.sku)return;if(!skuMap[s.sku])skuMap[s.sku]={desc:s.desc||'',meta:0,real:0};skuMap[s.sku].meta+=(s.meta||0);skuMap[s.sku].real+=(s.real||0);});});
  const skuEntries=Object.entries(skuMap);
  if(skuEntries.length){
    h+='<div class="sku-summary"><div class="chart-title">📦 SKUs Produzidos</div><table class="sku-tbl"><thead><tr><th>SKU</th><th>Descrição</th><th style="text-align:right">Meta</th><th style="text-align:right">Real</th><th style="text-align:right">%</th></tr></thead><tbody>';
    skuEntries.forEach(([cod,v])=>{const p=v.meta>0?pct(v.real,v.meta):null,pc=p===null?'var(--muted)':p>=95?'var(--green)':p>=80?'var(--orange)':'var(--red)';h+='<tr><td style="font-weight:700">'+cod+'</td><td style="font-size:10px;color:var(--muted)">'+v.desc.slice(0,30)+'</td><td style="text-align:right">'+v.meta+'</td><td style="text-align:right;font-weight:700">'+v.real+'</td><td style="text-align:right;color:'+pc+';font-weight:700">'+(p!==null?p+'%':'—')+'</td></tr>';});
    h+='</tbody></table></div>';
  }

  // Weight status cards
  const wBySku={};pesagensHoje.filter(p=>fltLine==='ALL'||p.linha===fltLine).forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!wBySku[k])wBySku[k]={sku:p.sku,desc:p.sku_desc||'',gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>wBySku[k].weights.push(v));});
  const wEntries=Object.values(wBySku);
  if(wEntries.length){
    h+='<div class="section-lbl">Controle de Peso — Lotes do Dia</div><div class="an-summary">';
    wEntries.forEach(w=>{
      const ev=w.weights.length>=5?inmetroEval(w.weights,w.gram):{status:'pending'};
      const col=ev.status==='approved'?'green':ev.status==='rejected'?'red':'orange';
      const icon=ev.status==='approved'?'✅':ev.status==='rejected'?'❌':'⏳';
      h+='<div class="an-card '+col+'"><div class="an-lbl">'+icon+' '+w.sku+'</div><div class="an-val">'+(ev.mean?ev.mean+'g':'—')+'</div><div class="an-sub">'+w.weights.length+' pesagens · Qn='+w.gram+'g'+(ev.sd?' · σ='+ev.sd+'g':'')+'</div></div>';
    });
    h+='</div>';
  }

  // Standards Deviations
  const devs=padDeviations(flt);
  if(devs.length){
    h+='<div class="dev-box"><div class="chart-title" style="color:#92400E">⚠️ Desvios de Padrão ('+devs.length+')</div>';
    devs.forEach(d=>{h+='<div class="dev-item"><div class="dev-dot '+(d.status==='dg'?'grave':'leve')+'"></div><span style="flex:1">'+d.item+(d.comment?' — <em style="color:var(--muted)">'+d.comment+'</em>':'')+'</span><span class="pad-crit '+d.crit+'">'+d.crit.toUpperCase()+'</span></div>';});
    h+='</div>';
  }

  // Charts
  h+='<div class="chart-grid"><div class="chart-card"><div class="chart-title">📦 Produção (últimos 14 dias)</div><canvas id="c-prod"></canvas></div><div class="chart-card"><div class="chart-title">🔴 NCs por dia</div><canvas id="c-ncs"></canvas></div></div>';

  // Daily Insights
  h+='<div class="daily-box"><div class="daily-title">💡 INSIGHTS DO DIA</div>';
  const ins=[];
  if(P!==null&&P>=METAS.P) ins.push({t:'Produção em '+P.toFixed(1)+'%. Meta atingida!',c:'green'});
  else if(P!==null) ins.push({t:'Produção em '+P.toFixed(1)+'% (meta: '+METAS.P+'%).',c:P>=METAS.P*0.85?'yellow':'red'});
  if(Q>METAS.Q) ins.push({t:Q+' NCs (meta: ≤'+METAS.Q+'). Verificar modos recorrentes.',c:'red'});
  else if(Q===0) ins.push({t:'Zero NCs. Dia limpo!',c:'green'});
  if(S>0) ins.push({t:S+' evento(s) de segurança.',c:'red'}); else ins.push({t:'Zero eventos de segurança.',c:'green'});
  if(Ckg>50) ins.push({t:'Perdas: '+Ckg+'kg (R$'+Crs+'). Investigar.',c:'red'});
  if(padStats.dg>0) ins.push({t:padStats.dg+' desvio(s) grave(s) de padrão.',c:'red'});
  flt.forEach(e=>{if(e.comentarioP)ins.push({t:'📝 '+e.supervisor+': '+e.comentarioP,c:'blue'});if(e.comentarioQ)ins.push({t:'📝 '+e.supervisor+': '+e.comentarioQ,c:'blue'});});
  ins.forEach(i=>{h+='<div class="daily-item '+i.c+'">'+i.t+'</div>';});
  h+='</div>';

  document.getElementById('dash-body').innerHTML=h;

  // Render charts
  Object.values(dashCharts).forEach(c=>{try{c.destroy()}catch(e){}});dashCharts={};
  const td=fltLine==='ALL'?[...activeEntries(allEntries)].reverse().slice(-14):[...activeEntries(allEntries)].filter(e=>e.linha===fltLine).reverse().slice(-14);
  const lb=td.map(e=>e.data.slice(5));
  const cp=document.getElementById('c-prod'),cn=document.getElementById('c-ncs');
  if(cp)dashCharts.p=new Chart(cp,{type:'bar',data:{labels:lb,datasets:[{label:'Meta',data:td.map(e=>e.metaUnid||0),backgroundColor:'#E5E5E0',borderRadius:3},{label:'Real',data:td.map(e=>e.realUnid||0),backgroundColor:'#FFB81D',borderRadius:3}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:9}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:8}}},y:{ticks:{font:{family:'DM Mono',size:8}}}},maintainAspectRatio:true}});
  if(cn)dashCharts.n=new Chart(cn,{type:'bar',data:{labels:lb,datasets:[{label:'NCs',data:td.map(e=>totalNCs(e)),backgroundColor:'#EE273766',borderColor:'#EE2737',borderWidth:1,borderRadius:3}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:9}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:8}}},y:{min:0,ticks:{font:{family:'DM Mono',size:8}}}},maintainAspectRatio:true}});
}

function KC(p,label,val,unit,sub,color,bg){const d=val!==null?(p==='Q'||p==='S'?Math.round(val)+unit:typeof val==='number'?val.toFixed(1)+unit:val+unit):'–';return '<div class="kpi-card" onclick="openModal(\''+p+'\')"><div class="kpi-hdr"><span class="kpi-lbl">'+label+'</span><span class="kpi-bdg" style="background:'+bg+'">'+p+'</span></div><div class="kpi-val" style="color:'+color+'">'+d+'</div><div class="kpi-sub">'+sub+'</div><div class="kpi-drill">↗ detalhar</div><div class="kpi-bar" style="background:'+color+'"></div></div>';}

// ═══ MODAL ═══
function openModal(p){modalPilar=p;modalPeriod='semana';document.getElementById('modal-title').textContent={P:'Produção',Q:'Qualidade',C:'Custo / Perdas',S:'Segurança',M:'Moral',PAD:'Padrões'}[p];document.getElementById('modal-sub').textContent='Linha: '+(fltLine==='ALL'?'Todas':fltLine);document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('active',i===0));document.getElementById('modal-tabs').style.display='flex';renderModal();document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');modalCharts.forEach(c=>{try{c.destroy()}catch(e){}});modalCharts=[];}
function setMTab(p,el){modalPeriod=p;document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderModal();}
function getMD(){const ref=new Date(fltDate+'T12:00'),cut=new Date(ref);if(modalPeriod==='semana')cut.setDate(cut.getDate()-7);else if(modalPeriod==='mes')cut.setDate(cut.getDate()-30);else cut.setDate(cut.getDate()-365);let d=activeEntries(allEntries).filter(e=>{const dt=new Date(e.data+'T12:00');return dt>=cut&&dt<=ref;});if(fltLine!=='ALL')d=d.filter(e=>e.linha===fltLine);return d.reverse();}
function renderModal(){
  modalCharts.forEach(c=>{try{c.destroy()}catch(e){}});modalCharts=[];
  const data=getMD(),body=document.getElementById('modal-body');
  if(!data.length){body.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);font-size:12px;font-family:\'DM Mono\'">Nenhum registro</div>';return;}
  const grouped={};data.forEach(e=>{if(!grouped[e.data])grouped[e.data]=[];grouped[e.data].push(e);});
  const dates=Object.keys(grouped),labels=dates.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));
  let html='';

  if(modalPilar==='P'){
    const vals=Object.values(grouped).map(es=>avg(es,e=>e.metaUnid>0?pct(e.realUnid,e.metaUnid):null));
    html='<canvas id="mc1" style="max-height:300px"></canvas>';body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:[{label:'% Atingimento',data:vals,backgroundColor:'#2563EB66',borderColor:'#2563EB',borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:9}}},y:{ticks:{font:{family:'DM Mono',size:9}}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='M'){
    const vals=Object.values(grouped).map(es=>avg(es,e=>e.totalColab>0?pct(e.presentes,e.totalColab):null));
    html='<canvas id="mc1" style="max-height:300px"></canvas>';body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:[{label:'% Presença',data:vals,backgroundColor:'#EA580C66',borderColor:'#EA580C',borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:9}}},y:{ticks:{font:{family:'DM Mono',size:9}}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='PAD'){
    const vals=Object.values(grouped).map(es=>{let ok=0,tot=0;es.forEach(e=>{const p=e.padroes||{};Object.values(p).forEach(v=>{tot++;if(v==='c')ok++;});});return tot?pct(ok,tot):null;});
    html='<canvas id="mc1" style="max-height:300px"></canvas>';body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets:[{label:'% Conformidade',data:vals,backgroundColor:'#0369A166',borderColor:'#0369A1',borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:9}}},y:{ticks:{font:{family:'DM Mono',size:9}}}},maintainAspectRatio:true}}));
  }else if(modalPilar==='Q'){
    const allModes={};data.forEach(e=>(e.ncs||[]).forEach(n=>{allModes[n.mode||n.cat||'Outros']=true;}));
    const modeList=Object.keys(allModes),palette=['#D97706','#DC2626','#7C3AED','#2563EB','#059669','#C2410C','#EC4899','#6366F1','#14B8A6','#F59E0B'];
    const datasets=modeList.map((m,mi)=>({label:m.length>22?m.slice(0,22)+'…':m,data:dates.map(d=>grouped[d].reduce((s,e)=>(e.ncs||[]).reduce((ss,n)=>ss+((n.mode||n.cat||'Outros')===m?(n.qty||0):0),s),0)),backgroundColor:palette[mi%palette.length]+'AA',borderRadius:2}));
    html='<canvas id="mc1" style="max-height:300px"></canvas><div style="margin-top:16px" id="mc-pareto"></div>';body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:8}},maxHeight:60}},scales:{x:{stacked:true,ticks:{font:{family:'DM Mono',size:8}}},y:{stacked:true,ticks:{font:{family:'DM Mono',size:9}}}},maintainAspectRatio:true}}));
    const pareto=ncPareto(data),total=pareto.reduce((s,[,v])=>s+v,0);
    if(pareto.length){const mx=pareto[0][1];document.getElementById('mc-pareto').innerHTML='<div class="chart-title">Pareto — '+total+' NCs</div>'+pareto.slice(0,8).map(([cat,cnt])=>'<div class="pareto-row"><div class="pareto-lbl" style="font-size:10px">'+cat+'</div><div class="pareto-bar-track" style="height:20px"><div class="pareto-bar-fill" style="width:'+(cnt/mx*100).toFixed(0)+'%;background:#D97706"></div></div><div class="pareto-cnt" style="color:#D97706">'+cnt+'</div></div>').join('');}
  }else if(modalPilar==='S'){
    const datasets=BYRD_LEVELS.map(lv=>({label:lv,data:dates.map(d=>grouped[d].reduce((s,e)=>(e.incidentes||[]).reduce((ss,i)=>ss+(i.camada===lv?1:0),s),0)),backgroundColor:BYRD_COLORS[lv]+'AA',borderRadius:2}));
    html='<canvas id="mc1" style="max-height:300px"></canvas><div style="margin-top:16px" id="mc-pareto"></div>';body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:9}}}},scales:{x:{stacked:true,ticks:{font:{family:'DM Mono',size:8}}},y:{stacked:true,beginAtZero:true,ticks:{font:{family:'DM Mono',size:9}}}},maintainAspectRatio:true}}));
    const modeMap={};data.forEach(e=>(e.incidentes||[]).forEach(i=>{if(i.camada&&i.camada!=='nenhum')modeMap[i.modo||i.camada]=(modeMap[i.modo||i.camada]||0)+1;}));
    const pareto=Object.entries(modeMap).sort((a,b)=>b[1]-a[1]),total=pareto.reduce((s,[,v])=>s+v,0);
    if(pareto.length){const mx=pareto[0][1];document.getElementById('mc-pareto').innerHTML='<div class="chart-title">Pareto — '+total+' eventos</div>'+pareto.slice(0,8).map(([cat,cnt])=>'<div class="pareto-row"><div class="pareto-lbl" style="font-size:10px">'+cat+'</div><div class="pareto-bar-track" style="height:20px"><div class="pareto-bar-fill" style="width:'+(cnt/mx*100).toFixed(0)+'%;background:#7C3AED"></div></div><div class="pareto-cnt" style="color:#7C3AED">'+cnt+'</div></div>').join('');}
  }else if(modalPilar==='C'){
    const types=[['DL (kg)','perdaDlKg','#F59E0B'],['Biscoito (kg)','perdaBiscoitoKg','#C2410C'],['Rejeito (kg)','perdaRejeitoDosKg','#7C3AED'],['Quebra (kg)','perdaQuebraKg','#6B7280'],['Dosado (un)','perdaDosadoUn','#3B82F6'],['Coberto (un)','perdaCobertoUn','#EC4899'],['Chocolate (un)','perdaChocolateUn','#14B8A6']];
    const datasets=types.map(([lbl,key,col])=>({label:lbl,data:dates.map(d=>+grouped[d].reduce((s,e)=>s+(e[key]||0),0).toFixed(1)),backgroundColor:col+'AA',borderRadius:2}));
    html='<canvas id="mc1" style="max-height:300px"></canvas>';body.innerHTML=html;
    modalCharts.push(new Chart(document.getElementById('mc1'),{type:'bar',data:{labels,datasets},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:8}},maxHeight:60}},scales:{x:{stacked:true,ticks:{font:{family:'DM Mono',size:8}}},y:{stacked:true,ticks:{font:{family:'DM Mono',size:9}}}},maintainAspectRatio:true}}));
  }
}

}
