<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
.dash-hero{background:var(--grad1);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:var(--yellow);opacity:.06}
.hero-date{font-family:'Bebas Neue';font-size:28px;color:var(--yellow);letter-spacing:3px;line-height:1}
.hero-sub{font-size:10px;color:#9CA3AF;font-family:'DM Mono';margin-top:2px;letter-spacing:1px}
.hero-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.hero-badge{font-size:9px;font-family:'DM Mono';padding:3px 10px;border-radius:12px;font-weight:600}
.hero-badge.live{background:#DCFCE7;color:var(--green)}.hero-badge.warn{background:#FEF9C3;color:#92400E}.hero-badge.err{background:#FEE2E2;color:var(--red)}
.oee-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.oee-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.oee-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.oee-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow)}
.oee-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oee-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono'}
.oee-turno-badge{font-size:8px;font-family:'DM Mono';padding:2px 8px;border-radius:10px;font-weight:700}
.oee-t-T1{background:#E0E7FF;color:var(--blue)}
.oee-t-T2{background:#FEF3C7;color:#92400E}
.oee-t-T3{background:#E9D5FF;color:var(--purple)}
.oee-val{font-family:'Bebas Neue';font-size:36px;letter-spacing:1px;line-height:1}
.oee-sub{font-size:9px;color:var(--muted);font-family:'DM Mono';margin-top:4px}
.oee-bar{height:6px;background:var(--lg);border-radius:3px;margin-top:8px;overflow:hidden}
.oee-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.prod-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.prod-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:.15s}
.prod-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.prod-val{font-family:'Bebas Neue';font-size:28px;line-height:1;margin:6px 0 2px}
.prod-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono';letter-spacing:1px;text-transform:uppercase}
.prod-sub{font-size:10px;color:var(--muted);margin-top:4px}
.summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:14px}
.sum-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.sum-card.real::before{background:#DC2626}
.sum-card.omie::before{background:#F59E0B}
.sum-card.bopp::before{background:#14B8A6}
.sum-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sum-lbl{font-size:9px;font-family:'DM Mono';font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.sum-tag{font-size:8px;font-family:'DM Mono';padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sum-tag.real{background:#FEE2E2;color:#991B1B}
.sum-tag.omie{background:#FEF3C7;color:#92400E}
.sum-tag.bopp{background:#CCFBF1;color:#0F766E}
.sum-val{font-family:'Bebas Neue';font-size:42px;letter-spacing:1px;line-height:1;margin:6px 0}
.sum-val.real{color:#DC2626}
.sum-val.omie{color:#D97706}
.sum-val.bopp.pos{color:#DC2626}
.sum-val.bopp.neg{color:#0F766E}
.sum-val.bopp.neutro{color:var(--muted)}
.sum-detail{font-size:10px;font-family:'DM Mono';color:var(--muted);line-height:1.6;margin-top:6px}
.sum-detail strong{color:var(--ink)}
.sum-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--border)}
.sum-row:last-child{border-bottom:none}
.dosados-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.dos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:10px}
.dos-item{background:var(--lg);border-radius:12px;padding:12px;border-left:4px solid #4338CA}
.dos-item.final{border-left-color:#0F766E}
.dos-item-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.dos-cod{font-family:'DM Mono';font-size:11px;font-weight:700;color:var(--ink)}
.dos-tag{font-size:8px;font-family:'DM Mono';padding:2px 6px;border-radius:8px;font-weight:700}
.dos-tag.inter{background:#E0E7FF;color:#4338CA}
.dos-tag.final{background:#CCFBF1;color:#0F766E}
.dos-desc{font-size:10px;color:var(--muted);font-family:'DM Mono';margin-bottom:6px}
.dos-vals{display:flex;justify-content:space-between;align-items:baseline;padding-top:6px;border-top:1px dashed var(--border)}
.dos-kg{font-family:'Bebas Neue';font-size:22px;line-height:1}
.dos-alf{font-size:10px;color:var(--muted);font-family:'DM Mono'}
.dos-linhas{font-size:9px;font-family:'DM Mono';color:var(--muted);margin-top:4px}
.dos-skus{font-size:9px;color:var(--muted);font-family:'DM Mono';margin-top:4px;line-height:1.4}
.loss-total-card{background:var(--grad1);border-radius:20px;padding:22px;margin-bottom:14px;color:var(--white);position:relative;overflow:hidden}
.loss-total-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--red);opacity:.08}
.loss-total-lbl{font-size:10px;font-family:'DM Mono';color:#9CA3AF;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.loss-total-val{font-family:'Bebas Neue';font-size:56px;color:var(--yellow);letter-spacing:2px;line-height:1}
.loss-total-sub{font-size:11px;color:#D1D5DB;margin-top:4px;font-family:'DM Mono'}
.loss-total-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.loss-total-item{background:rgba(255,255,255,0.06);border-radius:10px;padding:12px}
.loss-total-item-v{font-family:'Bebas Neue';font-size:22px;line-height:1;color:var(--yellow)}
.loss-total-item-l{font-size:9px;color:#9CA3AF;font-family:'DM Mono';letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.sobre-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.sobre-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.sobre-box{background:var(--lg);border-radius:12px;padding:12px;border-left:4px solid}
.sobre-box.dose{border-left-color:#EA580C}
.sobre-box.cob{border-left-color:#7C3AED}
.sobre-box.final{border-left-color:#0369A1}
.sobre-lbl{font-size:10px;font-family:'DM Mono';color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.sobre-val{font-family:'Bebas Neue';font-size:28px;line-height:1;margin:4px 0}
.sobre-sub{font-size:9px;font-family:'DM Mono';color:var(--muted)}
@media(max-width:600px){
  .oee-strip,.prod-strip,.summary-strip{grid-template-columns:1fr 1fr}
  .loss-total-grid,.sobre-grid{grid-template-columns:1fr}
  .hero-date{font-size:22px}.loss-total-val{font-size:44px}.sum-val{font-size:32px}
}
</style>

<body>
<div class="hdr">
  <div class="logo"><div class="logo-bar"></div><div><div style="display:flex;align-items:baseline"><span class="logo-title">ODARA</span><span style="color:#9CA3AF;font-size:11px;letter-spacing:1px;margin-left:6px">PQCDSM</span></div><span class="logo-tag">GESTÃO VISUAL DA PRODUÇÃO</span></div></div>
  <div class="hdr-right"><span class="hdr-date" id="hdr-date"></span><span class="hdr-cnt" id="hdr-cnt">—</span></div>
</div>
<div class="nav-bar" id="main-nav"></div>
<div style="background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:100">

  <span class="fl" style="margin:0">Turno</span>
  <div style="display:flex;gap:4px" id="turno-pills">
    <button class="pill active" onclick="setTurno('ALL',this)">Todos</button>
    <button class="pill" onclick="setTurno('T1',this)">T1</button>

</div>
<div class="content" id="dash-body"></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr"><div><div class="modal-title" id="modal-title"></div><div class="modal-sub" id="modal-sub"></div></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-tabs" id="modal-tabs">
      <button class="mtab active" onclick="setMTab('semana',this)">Semana</button>
      <button class="mtab" onclick="setMTab('mes',this)">Mês</button>
      <button class="mtab" onclick="setMTab('ano',this)">Ano</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="modal-overlay" id="oee-modal" onclick="if(event.target===this)closeOeeModal()">
  <div class="modal">
    <div class="modal-hdr"><div><div class="modal-title" id="oee-modal-title"></div><div class="modal-sub" id="oee-modal-sub"></div></div><button class="modal-close" onclick="closeOeeModal()">×</button></div>
    <div class="modal-body"><canvas id="oee-modal-chart" style="max-height:320px"></canvas><div id="oee-modal-stats" style="margin-top:16px"></div></div>
  </div>
</div>

<div class="modal-overlay" id="prod-modal" onclick="if(event.target===this)closeProdModal()">
  <div class="modal">
    <div class="modal-hdr"><div><div class="modal-title" id="prod-modal-title"></div><div class="modal-sub" id="prod-modal-sub"></div></div><button class="modal-close" onclick="closeProdModal()">×</button></div>
    <div class="modal-body">
      <div class="toggle-row" style="margin-bottom:12px"><button class="toggle-btn active" id="pmt-alf" onclick="setProdModalUnit('alf')">alf/p·h</button><button class="toggle-btn" id="pmt-kg" onclick="setProdModalUnit('kg')">kg/p·h</button></div>
      <canvas id="prod-modal-chart" style="max-height:320px"></canvas><div id="prod-modal-stats" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<div class="footer"><span>ODARA ALFAJORES · PQCDSM v13</span><span id="footer-src">inicializando…</span></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
if(!checkAuth())throw new Error('not auth');

let allEntries=[],fltDate=today(),fltLine='ALL',fltTurno='ALL';
let modalPilar=null,modalPeriod='semana',modalCharts=[];
let pesagensHoje=[],pesagensTodas=[],prodUnit='alf';
let oeeModalChart=null,prodModalChart=null,prodModalUnit='alf',prodModalLine='';

function setLine(l,el){fltLine=l;document.querySelectorAll('#line-pills .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderDash();}
function setTurno(t,el){fltTurno=t;document.querySelectorAll('#turno-pills .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderDash();}
function onDateChange(){fltDate=document.getElementById('flt-date').value||today();loadPesagens();}
async function loadPesagens(){try{pesagensHoje=await sbQuery('pesagens','select=*&data=eq.'+fltDate);}catch(e){pesagensHoje=[];}renderDash();}

async function loadAll(){
  document.getElementById('hdr-cnt').textContent='carregando…';
  try{
    await sbGetConfig();
    allEntries=(await sbQuery('pqcdsm','select=*&order=data.desc,created_at.desc&limit=1000')).map(norm);
    pesagensHoje=await sbQuery('pesagens','select=*&data=eq.'+fltDate);
    const cut=new Date();cut.setDate(cut.getDate()-60);
    pesagensTodas=await sbQuery('pesagens','select=*&data=gte.'+cut.toISOString().slice(0,10));
    const tc=activeEntries(allEntries).filter(e=>e.data===today()).length;
    document.getElementById('hdr-cnt').textContent=tc+' registro'+(tc!==1?'s':'')+' hoje';
    document.getElementById('footer-src').textContent='Supabase · '+allEntries.length+' reg';
  }catch(err){allEntries=[];document.getElementById('hdr-cnt').textContent='erro';showToast('❌ '+err.message,'err');}
  renderDash();
}

function calcSobrepesoLinha(ln,dataRef){
  const lnP=pesagensTodas.filter(p=>p.linha===ln&&p.data===dataRef&&p.ponto==='final');
  if(!lnP.length)return 0;
  const bySku={};
  lnP.forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!bySku[k])bySku[k]={gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>bySku[k].weights.push(v));});
  let tot=0;
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===dataRef&&e.linha===ln);
  Object.entries(bySku).forEach(([k,sk])=>{
    if(!sk.weights.length)return;
    const mean=sk.weights.reduce((a,b)=>a+b,0)/sk.weights.length;
    const overPct=mean>sk.gram?(mean-sk.gram)/sk.gram:0;
    let alfSku=0;
    lnEntries.forEach(e=>{
      const sp=e.embalagens&&e.embalagens.length?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');
      if(sp&&sp.length)sp.forEach(s=>{if(s.sku===k.split('||')[0])alfSku+=(s.real||0);});
    });
    if(!alfSku){alfSku=lnEntries.reduce((s,e)=>s+(e.realUnid||0),0);}
    tot+=(overPct*alfSku*sk.gram)/1000;
  });
  return r2(tot);
}

function calcOeeLinhaTurno(entries,linha,turno){
  const teo=OEE_TEORICO[linha];if(!teo)return null;
  const lnE=entries.filter(e=>e.linha===linha&&e.turno===turno);
  if(!lnE.length)return null;
  let real=0;
  lnE.forEach(e=>{if(e.embalagens&&e.embalagens.length){real+=e.embalagens.reduce((s,x)=>s+(x.real||0),0);}else{real+=(e.realUnid||0);}});
  const manutH=lnE.reduce((s,e)=>s+(e.paradaManutMin||0),0)/60;
  const hLiq={T1:teo.horasLiqT1,T2:teo.horasLiqT2,T3:teo.horasLiqT3||teo.horasLiqT1}[turno]||teo.horasLiqT1;
  const availH=Math.max(hLiq-manutH,0.1);
  const teoMax=teo.velNominal*availH;
  const oee=teoMax>0?(real/teoMax)*100:0;
  return{oee:+oee.toFixed(1),real,teoMax:Math.round(teoMax),availH:+availH.toFixed(1),manutH:+manutH.toFixed(1),velNom:teo.velNominal,hLiq};
}

function calcProd(entries,linha){
  const lnE=entries.filter(e=>(linha==='ALL'||e.linha===linha));
  if(!lnE.length)return null;
  const turnos=new Set(lnE.map(e=>e.turno));
  const teo=OEE_TEORICO[linha]||{horasLiqT1:6.8,horasLiqT2:6.8,horasLiqT3:6.8};
  let hLiqTotal=teo.horasLiqT1;
  if(turnos.has('T2'))hLiqTotal+=teo.horasLiqT2;
  if(turnos.has('T3'))hLiqTotal+=teo.horasLiqT3||teo.horasLiqT1;
  let totAlf=0,totKg=0;
  lnE.forEach(e=>{
    if(e.embalagens&&e.embalagens.length){e.embalagens.forEach(x=>{totAlf+=(x.real||0);totKg+=(x.real||0)*(x.gram||0)/1000;});}
    else{totAlf+=(e.realUnid||0);const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{real:e.realUnid,gram:e.skuGram}];sp.forEach(s=>{totKg+=(s.real||0)*(s.gram||0)/1000;});}
  });
  let totPres=lnE.reduce((s,e)=>s+(e.presentes||0),0);
  const adic=(linha!=='ALL'&&PESSOAS_ADIC[linha])?PESSOAS_ADIC[linha]:0;
  totPres+=adic;
  if(!totPres)return null;
  if(totKg===0)totKg=totAlf*0.05;
  const alfPH=totAlf/(totPres*hLiqTotal);
  const kgPH=totKg/(totPres*hLiqTotal);
  return{alfPH:+alfPH.toFixed(1),kgPH:+kgPH.toFixed(2),totalAlf:totAlf,totalKg:r2(totKg),pres:totPres,adic,hLiqTotal,turnos:[...turnos]};
}

function renderDash(){
  fltDate=document.getElementById('flt-date').value||today();
  document.getElementById('hdr-date').textContent=new Date(fltDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  let filtered=activeEntries(allEntries).filter(e=>e.data===fltDate);
  if(fltLine!=='ALL')filtered=filtered.filter(e=>e.linha===fltLine);
  if(fltTurno!=='ALL')filtered=filtered.filter(e=>e.turno===fltTurno);
  const flt=filtered;
  if(!flt.length){document.getElementById('dash-body').innerHTML='<div class="empty" style="margin-top:20px"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700;margin-bottom:4px">Nenhum registro nesse filtro</div><a href="entrada.html" style="display:inline-block;margin-top:14px;background:var(--yellow);border-radius:20px;padding:9px 20px;font-weight:700;font-size:12px;color:var(--black)">Abrir entrada →</a></div>';return;}
  let h='';

  const P_u=avg(flt,e=>e.metaUnid>0?pct(e.realUnid,e.metaUnid):null),P_c=avg(flt,e=>e.metaCarr>0?pct(e.realCarr,e.metaCarr):null),P=P_u!==null?P_u:P_c;
  const Q=flt.reduce((s,e)=>s+totalNCs(e),0),S=flt.reduce((s,e)=>s+totalIncs(e),0);
  const M=avg(flt,e=>e.totalColab>0?pct(e.presentes,e.totalColab):null);
  const padStats=(()=>{let ok=0,dl=0,dg=0,tot=0;flt.forEach(e=>{const p=e.padroes||{};Object.values(p).forEach(v=>{tot++;if(v==='c')ok++;else if(v==='dl')dl++;else if(v==='dg')dg++;});});return{ok,dl,dg,tot,pct:tot?pct(ok,tot):null};})();

  const turnos=new Set(flt.map(e=>e.turno));
  const hasManut=flt.some(e=>e.paradaManut);
  const totalManutMin=flt.reduce((s,e)=>s+(e.paradaManutMin||0),0);

  h+='<div class="dash-hero"><div class="hero-date">'+new Date(fltDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}).toUpperCase()+'</div>';
  h+='<div class="hero-sub">'+(fltLine==='ALL'?'FÁBRICA':'LINHA '+fltLine.replace('L',''))+(fltTurno==='ALL'?' · Turnos: '+[...turnos].sort().join(', '):' · TURNO '+fltTurno)+'</div>';
  h+='<div class="hero-badges"><span class="hero-badge live">● '+flt.length+' reg</span>';
  if(hasManut)h+='<span class="hero-badge warn">🔧 '+totalManutMin+'min manut</span>';
  if(S>0)h+='<span class="hero-badge err">⚠ '+S+' seg</span>';
  h+='</div></div>';

  const lines=fltLine==='ALL'?['L1','L2','L3']:[fltLine];
  const totalQuebra=r2(flt.reduce((s,e)=>s+(e.perdaQuebraFornecKg||0),0));
  const totalVarrBisc=r2(flt.reduce((s,e)=>s+(e.perdaVarrBiscKg||0),0));
  const totalRejeito=r2(flt.reduce((s,e)=>s+(e.perdaRejeitoDosKg||0),0));
  const totalVarrDos=r2(flt.reduce((s,e)=>s+(e.perdaVarrDosKg||0),0));

  const skuMap={};flt.forEach(e=>{const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{sku:e.sku,desc:e.skuDesc,meta:e.metaUnid,real:e.realUnid,tipo:'embalagem'}];sp.forEach(s=>{if(!s.sku||s.tipo==='dosagem')return;if(!skuMap[s.sku])skuMap[s.sku]={desc:s.desc||'',meta:0,real:0};skuMap[s.sku].meta+=(s.meta||0);skuMap[s.sku].real+=(s.real||0);});});
  const skuE=Object.entries(skuMap);
  if(skuE.length){
    h+='<div class="sku-summary"><div class="chart-title">📦 SKUs Embalados</div><table class="sku-tbl"><thead><tr><th>SKU</th><th>Descrição</th><th style="text-align:right">Meta</th><th style="text-align:right">Real</th><th style="text-align:right">%</th></tr></thead><tbody>';
    skuE.forEach(([cod,v])=>{const p=v.meta>0?pct(v.real,v.meta):null,pc=p===null?'var(--muted)':p>=95?'var(--green)':p>=80?'var(--orange)':'var(--red)';h+='<tr><td style="font-weight:700">'+cod+'</td><td style="font-size:10px;color:var(--muted)">'+v.desc.slice(0,30)+'</td><td style="text-align:right">'+v.meta.toLocaleString('pt-BR')+'</td><td style="text-align:right;font-weight:700">'+v.real.toLocaleString('pt-BR')+'</td><td style="text-align:right;color:'+pc+';font-weight:700">'+(p!==null?p+'%':'—')+'</td></tr>';});
    h+='</tbody></table></div>';
  }

  // Pesagens FINAL
  const wBySku={};pesagensHoje.filter(p=>(fltLine==='ALL'||p.linha===fltLine)&&p.ponto==='final').forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!wBySku[k])wBySku[k]={sku:p.sku,desc:p.sku_desc||'',gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>wBySku[k].weights.push(v));});
  const wE=Object.values(wBySku);
  if(wE.length){
    h+='<div class="section-lbl">Controle de Peso · FINAL</div><div class="an-summary">';
    wE.forEach(w=>{
      const ev=w.weights.length>=5?inmetroEval(w.weights,w.gram):{status:'pending'};
      const col=ev.status==='approved'?'green':ev.status==='rejected'?'red':'orange';
      const icon=ev.status==='approved'?'✅':ev.status==='rejected'?'❌':'⏳';
      const overPct=ev.mean&&ev.mean>w.gram?((ev.mean-w.gram)/w.gram*100):null;
      h+='<div class="an-card '+col+'"><div class="an-lbl">'+icon+' '+w.sku+'</div><div class="an-val">'+(ev.mean?fmt2(ev.mean)+'g':'—')+'</div><div class="an-sub">'+w.weights.length+' pesagens · Qn='+w.gram+'g'+(ev.sd?' · σ='+fmt2(ev.sd)+'g':'')+(overPct!==null?' · <strong style="color:var(--purple)">+'+fmt2(overPct)+'%</strong>':'')+'</div></div>';
    });
    h+='</div>';
  }

  const devs=padDeviations(flt);
  if(devs.length){
    h+='<div class="dev-box"><div class="chart-title" style="color:#92400E">⚠️ Desvios de Padrão ('+devs.length+')</div>';
    devs.forEach(d=>{h+='<div class="dev-item"><div class="dev-dot '+(d.status==='dg'?'grave':'leve')+'"></div><span style="flex:1">'+d.item+(d.comment?' — <em style="color:var(--muted)">'+d.comment+'</em>':'')+'</span></div>';});
    h+='</div>';
  }

  // Insights
  h+='<div class="daily-box"><div class="daily-title">💡 INSIGHTS — REUNIÃO DIÁRIA</div>';
  const ins=[];
  if(P!==null&&P>=METAS.P)ins.push({t:'Produção em '+P.toFixed(1)+'%. Meta atingida!',c:'green'});
  else if(P!==null)ins.push({t:'Produção em '+P.toFixed(1)+'% (meta: '+METAS.P+'%).',c:P>=METAS.P*0.85?'yellow':'red'});
  if(Q===0)ins.push({t:'Zero NCs.',c:'green'});else if(Q>METAS.Q)ins.push({t:Q+' NCs. Verificar modos.',c:'red'});
  if(S>0)ins.push({t:S+' evento(s) de segurança.',c:'red'});else ins.push({t:'Zero eventos de segurança.',c:'green'});
  if(perdaMpKg>30)ins.push({t:'Perda de MP: '+fmt2(perdaMpKg)+' kg. Investigar.',c:'red'});
  else if(perdaMpKg>10)ins.push({t:'Perda de MP: '+fmt2(perdaMpKg)+' kg. Acompanhar.',c:'yellow'});
  if(perdaProdutoKg>30)ins.push({t:'Perda de produto pós-dosagem: '+fmt2(perdaProdutoKg)+' kg.',c:'red'});
  else if(perdaProdutoKg>10)ins.push({t:'Perda de produto: '+fmt2(perdaProdutoKg)+' kg.',c:'yellow'});
  if(sobrIso.sobrCoberturaKg>5)ins.push({t:'Sobrepeso de COBERTURA: '+fmt2(sobrIso.sobrCoberturaKg)+' kg. Ajustar dosagem da cobertura.',c:'red'});
  if(sobrIso.sobrDoseKg>5)ins.push({t:'Sobrepeso de DOSAGEM: '+fmt2(sobrIso.sobrDoseKg)+' kg. Ajustar dosadora.',c:'red'});
  if(Math.abs(boppDiff)>3)ins.push({t:'Δ BOPP real vs teórico: '+(boppDiff>0?'+':'')+fmt2(boppDiff)+' kg. '+(boppDiff>0?'Possível desperdício.':'Possível subapontamento.'),c:'red'});
  if(perdaEmbKg>5)ins.push({t:'Perda BOPP: '+fmt2(perdaEmbKg)+' kg. Verificar selagem.',c:'yellow'});
  if(hasManut)ins.push({t:'Parada manut: '+totalManutMin+' min.',c:'yellow'});
  if(padStats.dg>0)ins.push({t:padStats.dg+' desvio(s) grave(s).',c:'red'});
  if(omie.somaAbs>20)ins.push({t:'Gaps OMIE somam '+fmt2(omie.somaAbs)+' kg. Revisar contagens.',c:'red'});
  else if(omie.somaAbs>10)ins.push({t:'Gaps OMIE somam '+fmt2(omie.somaAbs)+' kg.',c:'yellow'});
  oeeCards.forEach(o=>{const meta=TARGETS_OEE[o.ln]||60;if(o.oee<meta*0.7)ins.push({t:'OEE '+o.ln+'/'+o.turno+' crítico: '+o.oee+'%.',c:'red'});});
  flt.forEach(e=>{if(e.comentarioP)ins.push({t:'📝 '+e.supervisor+': '+e.comentarioP,c:'blue'});});
  if(!ins.length)ins.push({t:'Dados insuficientes.',c:'yellow'});
  ins.forEach(i=>{h+='<div class="daily-item '+i.c+'">'+i.t+'</div>';});
  h+='</div>';

  document.getElementById('dash-body').innerHTML=h;
}

function KC(p,label,val,unit,sub,color,bg){const d=val!==null?(p==='Q'||p==='S'?Math.round(val)+unit:typeof val==='number'?fmt2(val)+unit:val+unit):'–';return '<div class="kpi-card" onclick="openModal(\''+p+'\')"><div class="kpi-hdr"><span class="kpi-lbl">'+label+'</span><span class="kpi-bdg" style="background:'+bg+'">'+p+'</span></div><div class="kpi-val" style="color:'+color+'">'+d+'</div><div class="kpi-sub">'+sub+'</div><div class="kpi-drill">↗ detalhar</div><div class="kpi-bar" style="background:'+color+'"></div></div>';}
function KC2(p,label,valStr,unit,sub,color,bg){return '<div class="kpi-card" onclick="openModal(\''+p+'\')"><div class="kpi-hdr"><span class="kpi-lbl">'+label+'</span><span class="kpi-bdg" style="background:'+bg+'">'+p+'</span></div><div class="kpi-val" style="color:'+color+'">'+valStr+unit+'</div><div class="kpi-sub">'+sub+'</div><div class="kpi-drill">↗ detalhar</div><div class="kpi-bar" style="background:'+color+'"></div></div>';}

function openOeeModal(linha,turno){
  document.getElementById('oee-modal-title').textContent='OEE — '+linha+(turno==='ALL'?' · Todos turnos':' · '+turno);
  document.getElementById('oee-modal-sub').textContent='Últimos 30 dias';
  const today=new Date(fltDate+'T12:00'),cut=new Date(today);cut.setDate(cut.getDate()-30);
  const byDate={};
  activeEntries(allEntries).forEach(e=>{
    const d=new Date(e.data+'T12:00');if(d<cut||d>today)return;
    if(linha!=='FAB'&&e.linha!==linha)return;
    if(turno!=='ALL'&&e.turno!==turno)return;
    if(!byDate[e.data])byDate[e.data]={entries:[]};byDate[e.data].entries.push(e);
  });
  const dates=Object.keys(byDate).sort();
  const series=dates.map(d=>{
    if(linha==='FAB'){
      let tR=0,tT=0;['L1','L2','L3'].forEach(ln=>{['T1','T2','T3'].forEach(t=>{if(turno!=='ALL'&&t!==turno)return;const o=calcOeeLinhaTurno(byDate[d].entries,ln,t);if(o){tR+=o.real;tT+=o.teoMax;}});});
      return tT>0?+((tR/tT)*100).toFixed(1):null;
    }else{
      if(turno==='ALL'){let tR=0,tT=0;['T1','T2','T3'].forEach(t=>{const o=calcOeeLinhaTurno(byDate[d].entries,linha,t);if(o){tR+=o.real;tT+=o.teoMax;}});return tT>0?+((tR/tT)*100).toFixed(1):null;}
      const o=calcOeeLinhaTurno(byDate[d].entries,linha,turno);return o?o.oee:null;
    }
  });
  const labels=dates.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));
  const meta=linha==='FAB'?(TARGETS_OEE.fabrica||60):(TARGETS_OEE[linha]||60);
  document.getElementById('oee-modal').classList.add('open');
  if(oeeModalChart){try{oeeModalChart.destroy()}catch(e){}}
  setTimeout(()=>{
    const cv=document.getElementById('oee-modal-chart');if(!cv)return;
    oeeModalChart=new Chart(cv,{type:'bar',data:{labels,datasets:[{label:'OEE %',data:series,backgroundColor:series.map(v=>v===null?'#E5E5E0':v>=meta?'#15803D99':v>=meta*0.7?'#C2410C99':'#CC292999'),borderWidth:0,borderRadius:3},{type:'line',label:'Meta',data:Array(series.length).fill(meta),borderColor:'#15803D',borderWidth:2,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:8},maxRotation:45}},y:{ticks:{font:{family:'DM Mono',size:9}},min:0}},maintainAspectRatio:true}});
    const vals=series.filter(v=>v!==null);
    const avgV=vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0;
    const maxV=vals.length?Math.max(...vals):0,minV=vals.length?Math.min(...vals):0;
    const atingiu=vals.filter(v=>v>=meta).length;
    document.getElementById('oee-modal-stats').innerHTML='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--ink)">'+avgV+'%</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Média</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--green)">'+maxV+'%</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Máx</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--red)">'+minV+'%</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Mín</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--yellow)">'+atingiu+'/'+vals.length+'</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Dias ≥ meta</div></div>'+
      '</div>';
  },80);
}
function closeOeeModal(){document.getElementById('oee-modal').classList.remove('open');if(oeeModalChart){try{oeeModalChart.destroy()}catch(e){}oeeModalChart=null;}}

function openProdModal(linha){
  prodModalLine=linha;prodModalUnit='alf';
  document.getElementById('pmt-alf').classList.add('active');document.getElementById('pmt-kg').classList.remove('active');
  document.getElementById('prod-modal-title').textContent='Produtividade — '+linha;
  document.getElementById('prod-modal-sub').textContent='Últimos 30 dias';
  document.getElementById('prod-modal').classList.add('open');
  renderProdModal();
}
function closeProdModal(){document.getElementById('prod-modal').classList.remove('open');if(prodModalChart){try{prodModalChart.destroy()}catch(e){}prodModalChart=null;}}
function setProdModalUnit(u){prodModalUnit=u;document.getElementById('pmt-alf').classList.toggle('active',u==='alf');document.getElementById('pmt-kg').classList.toggle('active',u==='kg');renderProdModal();}
function renderProdModal(){
  const today=new Date(fltDate+'T12:00'),cut=new Date(today);cut.setDate(cut.getDate()-30);
  const byDate={};
  activeEntries(allEntries).forEach(e=>{const d=new Date(e.data+'T12:00');if(d<cut||d>today)return;if(prodModalLine!=='ALL'&&e.linha!==prodModalLine)return;if(!byDate[e.data])byDate[e.data]=[];byDate[e.data].push(e);});
  const dates=Object.keys(byDate).sort();
  const series=dates.map(d=>{const p=calcProd(byDate[d],prodModalLine);return p?(prodModalUnit==='alf'?p.alfPH:p.kgPH):null;});
  const labels=dates.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));

    const cv=document.getElementById('prod-modal-chart');if(!cv)return;
    prodModalChart=new Chart(cv,{type:'line',data:{labels,datasets:[{label:prodModalUnit==='alf'?'alf/p·h':'kg/p·h',data:series,borderColor:'#2563EB',backgroundColor:'#2563EB22',borderWidth:2,fill:true,tension:0.3,pointRadius:3},{type:'line',label:'Meta',data:Array(series.length).fill(meta),borderColor:'#15803D',borderWidth:2,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{x:{ticks:{font:{family:'DM Mono',size:8},maxRotation:45}},y:{ticks:{font:{family:'DM Mono',size:9}},min:0}},maintainAspectRatio:true}});
    const vals=series.filter(v=>v!==null);
    const avgV=vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(prodModalUnit==='alf'?1:2):0;
    const maxV=vals.length?Math.max(...vals):0,minV=vals.length?Math.min(...vals):0;
    document.getElementById('prod-modal-stats').innerHTML='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px">'+avgV+'</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Média</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--green)">'+maxV+'</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Máx</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--red)">'+minV+'</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Mín</div></div>'+
      '<div style="background:var(--lg);border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:var(--yellow)">'+meta+'</div><div style="font-size:9px;color:var(--muted);font-family:\'DM Mono\'">Meta</div></div>'+
      '</div>';
  },80);
}

function openModal(p){modalPilar=p;modalPeriod='semana';document.getElementById('modal-title').textContent={P:'Produção',Q:'Qualidade',C:'Perdas',S:'Segurança',M:'Moral',PAD:'Padrões'}[p];document.getElementById('modal-sub').textContent='Linha: '+(fltLine==='ALL'?'Todas':fltLine);document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('active',i===0));renderModal();document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');modalCharts.forEach(c=>{try{c.destroy()}catch(e){}});modalCharts=[];}
function setMTab(p,el){modalPeriod=p;document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderModal();}
function getMD(){const ref=new Date(fltDate+'T12:00'),cut=new Date(ref);if(modalPeriod==='semana')cut.setDate(cut.getDate()-7);else if(modalPeriod==='mes')cut.setDate(cut.getDate()-30);else cut.setDate(cut.getDate()-365);let d=activeEntries(allEntries).filter(e=>{const dt=new Date(e.data+'T12:00');return dt>=cut&&dt<=ref;});if(fltLine!=='ALL')d=d.filter(e=>e.linha===fltLine);if(fltTurno!=='ALL')d=d.filter(e=>e.turno===fltTurno);return d.reverse();}
function renderModal(){
  modalCharts.forEach(c=>{try{c.destroy()}catch(e){}});modalCharts=[];
  const data=getMD(),body=document.getElementById('modal-body');
  if(!data.length){body.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);font-size:12px;font-family:\'DM Mono\'">Nenhum registro</div>';return;}
  const grouped={};data.forEach(e=>{if(!grouped[e.data])grouped[e.data]=[];grouped[e.data].push(e);});
  const dates=Object.keys(grouped),labels=dates.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));
  const mf={family:'DM Mono',size:9};body.innerHTML='<canvas id="mc1" style="max-height:300px"></canvas>';
  const cv=document.getElementById('mc1');
  if(modalPilar==='P'){
    const vals=Object.values(grouped).map(es=>avg(es,e=>e.metaUnid>0?pct(e.realUnid,e.metaUnid):null));
    modalCharts.push(new Chart(cv,{type:'bar',data:{labels,datasets:[{label:'%',data:vals,backgroundColor:'#2563EB66',borderColor:'#2563EB',borderWidth:1,borderRadius:4},{type:'line',label:'Meta',data:Array(vals.length).fill(METAS.P),borderColor:'#15803D',borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{ticks:{font:mf}},y:{ticks:{font:mf}}}}}));
  }else if(modalPilar==='C'){
    const types=[['V.Dosado','perdaVarrDosKg','#F59E0B'],['V.Coberto','perdaVarrCobKg','#EC4899'],['V.Biscoito','perdaVarrBiscKg','#C2410C'],['Quebra','perdaQuebraFornecKg','#DC2626'],['Rejeito','perdaRejeitoDosKg','#7C3AED'],['BOPP','perdaBoppKg','#14B8A6']];
    const ds=types.map(([lbl,key,col])=>({label:lbl,data:dates.map(d=>r2(grouped[d].reduce((s,e)=>s+(e[key]||0),0))),backgroundColor:col+'AA',borderRadius:2}));
    modalCharts.push(new Chart(cv,{type:'bar',data:{labels,datasets:ds},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:8}}}},scales:{x:{stacked:true,ticks:{font:mf}},y:{stacked:true,ticks:{font:mf}}}}}));
  }else if(modalPilar==='M'){
    const vals=Object.values(grouped).map(es=>avg(es,e=>e.totalColab>0?pct(e.presentes,e.totalColab):null));
    modalCharts.push(new Chart(cv,{type:'bar',data:{labels,datasets:[{label:'%',data:vals,backgroundColor:'#EA580C66',borderColor:'#EA580C',borderWidth:1,borderRadius:4},{type:'line',label:'Meta',data:Array(vals.length).fill(METAS.M),borderColor:'#15803D',borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{ticks:{font:mf}},y:{ticks:{font:mf}}}}}));
  }else if(modalPilar==='Q'){
    const allModes={};data.forEach(e=>(e.ncs||[]).forEach(n=>{allModes[n.mode||n.cat||'Outros']=true;}));
    const mList=Object.keys(allModes),pal=['#D97706','#DC2626','#7C3AED','#2563EB','#059669','#C2410C','#EC4899'];
    const ds=mList.map((m,i)=>({label:m.length>22?m.slice(0,22)+'…':m,data:dates.map(d=>grouped[d].reduce((s,e)=>(e.ncs||[]).reduce((ss,n)=>ss+((n.mode||n.cat||'Outros')===m?(n.qty||0):0),s),0)),backgroundColor:pal[i%pal.length]+'AA',borderRadius:2}));
    modalCharts.push(new Chart(cv,{type:'bar',data:{labels,datasets:ds},options:{plugins:{legend:{labels:{font:{family:'DM Mono',size:8}}}},scales:{x:{stacked:true,ticks:{font:mf}},y:{stacked:true,ticks:{font:mf}}}}}));
  }else if(modalPilar==='S'){
    const ds=BYRD_LEVELS.map(lv=>({label:lv,data:dates.map(d=>grouped[d].reduce((s,e)=>(e.incidentes||[]).reduce((ss,i)=>ss+(i.camada===lv?1:0),s),0)),backgroundColor:BYRD_COLORS[lv]+'AA',borderRadius:2}));
    modalCharts.push(new Chart(cv,{type:'bar',data:{labels,datasets:ds},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{stacked:true,ticks:{font:mf}},y:{stacked:true,ticks:{font:mf}}}}}));
  }else if(modalPilar==='PAD'){
    const vals=Object.values(grouped).map(es=>{let ok=0,tot=0;es.forEach(e=>{const p=e.padroes||{};Object.values(p).forEach(v=>{tot++;if(v==='c')ok++;});});return tot?pct(ok,tot):null;});
    modalCharts.push(new Chart(cv,{type:'bar',data:{labels,datasets:[{label:'%',data:vals,backgroundColor:'#0369A166',borderColor:'#0369A1',borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{labels:{font:mf}}},scales:{x:{ticks:{font:mf}},y:{ticks:{font:mf}}}}}));
  }
}

renderNav('dia');loadAll();
