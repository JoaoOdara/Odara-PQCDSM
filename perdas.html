<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Odara · Perdas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.section-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.big-card{background:var(--grad1);color:var(--white);border-radius:20px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.big-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--red);opacity:.08}
.big-lbl{font-size:10px;font-family:'DM Mono';color:#9CA3AF;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.big-val{font-family:'Bebas Neue';font-size:56px;color:var(--yellow);letter-spacing:2px;line-height:1}
.big-sub{font-size:11px;color:#D1D5DB;margin-top:4px;font-family:'DM Mono'}
.big-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:16px}
.big-item{background:rgba(255,255,255,0.06);border-radius:10px;padding:12px}
.big-item-v{font-family:'Bebas Neue';font-size:22px;line-height:1;color:var(--yellow)}
.big-item-l{font-size:9px;color:#9CA3AF;font-family:'DM Mono';letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.weight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.weight-card{background:var(--lg);border-radius:12px;padding:14px;border-left:4px solid var(--purple)}
.weight-card.sobre{border-left-color:#7C3AED}
.weight-card.dose{border-left-color:#EA580C}
.weight-card-title{font-size:10px;font-family:'DM Mono';color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.weight-card-val{font-family:'Bebas Neue';font-size:32px;line-height:1;margin-top:4px}
.weight-card-sub{font-size:10px;color:var(--muted);font-family:'DM Mono';margin-top:4px}
.omie-comp-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.omie-comp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.omie-comp-name{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px}
.omie-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.omie-stat{background:var(--lg);border-radius:8px;padding:8px;text-align:center}
.omie-stat-v{font-family:'Bebas Neue';font-size:20px;line-height:1}
.omie-stat-l{font-size:8px;color:var(--muted);font-family:'DM Mono';margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
@media(max-width:600px){.big-val{font-size:42px}.weight-grid{grid-template-columns:1fr}.omie-row3{grid-template-columns:1fr 1fr}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="hdr"><div class="logo"><div class="logo-bar"></div><div><span class="logo-title">ODARA</span><span class="logo-tag">PERDAS</span></div></div><div class="hdr-right"><span class="hdr-cnt" id="hdr-cnt">—</span></div></div>
<div class="nav-bar" id="main-nav"></div>
<div style="background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:100">
  <span class="fl" style="margin:0">Período</span>
  <div style="display:flex;gap:4px" id="period-pills">
    <button class="pill" onclick="setPeriod('hoje',this)">Hoje</button>
    <button class="pill active" onclick="setPeriod('semana',this)">7d</button>
    <button class="pill" onclick="setPeriod('mes',this)">30d</button>
    <button class="pill" onclick="setPeriod('trim',this)">90d</button>
    <button class="pill" onclick="setPeriod('ano',this)">365d</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span class="fl" style="margin:0">Linha</span>
  <div style="display:flex;gap:4px" id="line-pills">
    <button class="pill active" onclick="setLine('ALL',this)">Todas</button>
    <button class="pill" onclick="setLine('L1',this)">L1</button>
    <button class="pill" onclick="setLine('L2',this)">L2</button>
    <button class="pill" onclick="setLine('L3',this)">L3</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span class="fl" style="margin:0">Turno</span>
  <div style="display:flex;gap:4px" id="turno-pills">
    <button class="pill active" onclick="setTurno('ALL',this)">Todos</button>
    <button class="pill" onclick="setTurno('T1',this)">T1</button>
    <button class="pill" onclick="setTurno('T2',this)">T2</button>
    <button class="pill" onclick="setTurno('T3',this)">T3</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span style="font-size:10px;color:var(--blue);font-family:'DM Mono';cursor:pointer" onclick="loadAll()">↻ atualizar</span>
</div>
<div class="content" id="body"></div>
<div class="footer"><span>ODARA · PQCDSM v12 · Perdas</span><span></span></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
if(!checkAuth())throw new Error('not auth');

let allEntries=[],pesagensTodas=[];
let period='semana',fLine='ALL',fTurno='ALL';
let charts={};

function setPeriod(p,el){period=p;document.querySelectorAll('#period-pills .pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setLine(l,el){fLine=l;document.querySelectorAll('#line-pills .pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setTurno(t,el){fTurno=t;document.querySelectorAll('#turno-pills .pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}

async function loadAll(){
  document.getElementById('hdr-cnt').textContent='carregando…';
  try{
    await sbGetConfig();
    allEntries=(await sbQuery('pqcdsm','select=*&order=data.desc&limit=2000')).map(norm);
    const cut=new Date();cut.setDate(cut.getDate()-400);
    pesagensTodas=await sbQuery('pesagens','select=*&data=gte.'+cut.toISOString().slice(0,10));
    document.getElementById('hdr-cnt').textContent=allEntries.length+' reg';
  }catch(e){showToast('❌ '+e.message,'err');}
  render();
}

function getRange(){
  const ref=new Date();const cut=new Date(ref);
  if(period==='hoje')cut.setDate(cut.getDate());
  else if(period==='semana')cut.setDate(cut.getDate()-7);
  else if(period==='mes')cut.setDate(cut.getDate()-30);
  else if(period==='trim')cut.setDate(cut.getDate()-90);
  else cut.setDate(cut.getDate()-365);
  return{cut:cut.toISOString().slice(0,10),ref:ref.toISOString().slice(0,10)};
}

function getFiltered(){
  const{cut,ref}=getRange();
  let d=activeEntries(allEntries).filter(e=>e.data>=cut&&e.data<=ref);
  if(fLine!=='ALL')d=d.filter(e=>e.linha===fLine);
  if(fTurno!=='ALL')d=d.filter(e=>e.turno===fTurno);
  return d;
}

// Sobrepeso de uma data específica (das pesagens FINAL)
function sobrepesoData(dt,linha){
  const lnP=pesagensTodas.filter(p=>p.linha===linha&&p.data===dt&&p.ponto==='final');
  if(!lnP.length)return 0;
  const bySku={};
  lnP.forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!bySku[k])bySku[k]={gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>bySku[k].weights.push(v));});
  let tot=0;
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===dt&&e.linha===linha);
  Object.entries(bySku).forEach(([k,sk])=>{
    if(!sk.weights.length)return;
    const mean=sk.weights.reduce((a,b)=>a+b,0)/sk.weights.length;
    const overPct=mean>sk.gram?(mean-sk.gram)/sk.gram:0;
    let alfSku=0;
    lnEntries.forEach(e=>{const sp=e.embalagens&&e.embalagens.length?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');if(sp&&sp.length)sp.forEach(s=>{if(s.sku===k.split('||')[0])alfSku+=(s.real||0);});});
    if(!alfSku){alfSku=lnEntries.reduce((s,e)=>s+(e.realUnid||0),0);}
    tot+=(overPct*alfSku*sk.gram)/1000;
  });
  return +tot.toFixed(2);
}

// Sobredosagem: sobrepeso da DOSAGEM em D-1 referente a alfajores cobertos em D
// Usa data_dosagem do lançamento de embalagem para puxar a pesagem (ponto='final' ou 'dosagem' se existir)
function sobredosagemData(dt,linha){
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===dt&&e.linha===linha);
  let tot=0;
  lnEntries.forEach(e=>{
    const embs=e.embalagens||[];
    embs.forEach(emb=>{
      const dataDose=emb.dataDosagem;if(!dataDose)return;
      // Buscar pesagens (qualquer ponto) daquela data e linha desse SKU
      const ps=pesagensTodas.filter(p=>p.linha===linha&&p.data===dataDose&&p.sku===emb.sku);
      if(!ps.length)return;
      const weights=[];const gram=+emb.gram||0;
      ps.forEach(p=>[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>weights.push(v)));
      if(!weights.length||!gram)return;
      const mean=weights.reduce((a,b)=>a+b,0)/weights.length;
      const overPct=mean>gram?(mean-gram)/gram:0;
      tot+=(overPct*(emb.real||0)*gram)/1000;
    });
  });
  return +tot.toFixed(2);
}

function render(){
  const flt=getFiltered();
  if(!flt.length){document.getElementById('body').innerHTML='<div class="empty" style="margin-top:20px"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700">Nenhum registro nesse filtro</div></div>';return;}

  const lines=fLine==='ALL'?['L1','L2','L3']:[fLine];
  const{cut,ref}=getRange();

  // Acumulados
  const totalVarrDos=+flt.reduce((s,e)=>s+(e.perdaVarrDosKg||0),0).toFixed(1);
  const totalVarrCob=+flt.reduce((s,e)=>s+(e.perdaVarrCobKg||0),0).toFixed(1);
  const totalVarrBisc=+flt.reduce((s,e)=>s+(e.perdaVarrBiscKg||0),0).toFixed(1);
  const totalVarr=+(totalVarrDos+totalVarrCob+totalVarrBisc).toFixed(1);
  const totalQuebraFornec=+flt.reduce((s,e)=>s+(e.perdaQuebraFornecKg||0),0).toFixed(1);
  const totalRejeito=+flt.reduce((s,e)=>s+(e.perdaRejeitoDosKg||0),0).toFixed(1);
  const totalBopp=+flt.reduce((s,e)=>s+(e.perdaBoppKg||0),0).toFixed(1);

  // Sobrepeso e sobredosagem somando dia a dia, linha a linha
  const datas=[...new Set(flt.map(e=>e.data))].sort();
  let totalSobr=0,totalSobreDose=0;
  datas.forEach(dt=>{lines.forEach(ln=>{totalSobr+=sobrepesoData(dt,ln);totalSobreDose+=sobredosagemData(dt,ln);});});
  totalSobr=+totalSobr.toFixed(2);totalSobreDose=+totalSobreDose.toFixed(2);

  const perdaTotal=+(totalVarr+totalSobr+totalBopp).toFixed(1);

  // Kg produzidos no período (para %)
  let totalKgProd=0,totalAlfEmb=0;
  flt.forEach(e=>{if(e.embalagens&&e.embalagens.length){e.embalagens.forEach(x=>{totalKgProd+=(x.real||0)*(x.gram||0)/1000;totalAlfEmb+=(x.real||0);});}else{const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{real:e.realUnid,gram:e.skuGram}];sp.forEach(s=>{totalKgProd+=(s.real||0)*(s.gram||0)/1000;if(s.tipo!=='dosagem')totalAlfEmb+=(s.real||0);});}});
  totalKgProd=+totalKgProd.toFixed(1);

  // OMIE acumulado por componente
  const omieBisc=+flt.reduce((s,e)=>s+(e.omieBiscoitoKg||0),0).toFixed(1);
  const omieRech=+flt.reduce((s,e)=>s+(e.omieRecheiosKg||0),0).toFixed(1);
  const omieCob=+flt.reduce((s,e)=>s+(e.omieCoberturasKg||0),0).toFixed(1);

  let h='';
  // Hero — perda total do período
  h+='<div class="big-card"><div class="big-lbl">PERDA TOTAL — '+period.toUpperCase()+(fLine!=='ALL'?' · '+fLine:'')+(fTurno!=='ALL'?' · '+fTurno:'')+'</div>';
  h+='<div class="big-val">'+perdaTotal+' kg</div>';
  h+='<div class="big-sub">'+(totalKgProd>0?((perdaTotal/totalKgProd)*100).toFixed(2)+'% da produção · ':'')+totalKgProd+'kg produzidos · '+totalAlfEmb.toLocaleString('pt-BR')+' alfajores</div>';
  h+='<div class="big-grid">';
  h+='<div class="big-item"><div class="big-item-v">'+totalVarr+' kg</div><div class="big-item-l">Varredura</div></div>';
  h+='<div class="big-item"><div class="big-item-v">'+totalSobr+' kg</div><div class="big-item-l">Sobrepeso</div></div>';
  h+='<div class="big-item"><div class="big-item-v">'+totalBopp+' kg</div><div class="big-item-l">BOPP</div></div>';
  h+='<div class="big-item"><div class="big-item-v">'+totalQuebraFornec+' kg</div><div class="big-item-l">Quebra Fornec.</div></div>';
  h+='<div class="big-item"><div class="big-item-v">'+totalRejeito+' kg</div><div class="big-item-l">Rejeito Dos.</div></div>';
  h+='</div></div>';

  // Sobrepeso × Sobredosagem
  if(fLine!=='ALL'){
    h+='<div class="section-card"><div class="chart-title">⚖️ Sobrepeso × Sobredosagem · '+fLine+'</div>';
    h+='<p style="font-size:10px;color:var(--muted);font-family:\'DM Mono\';margin-top:4px">Sobrepeso = peso acima do nominal nas pesagens do dia. Sobredosagem = peso acima do nominal das pesagens da DOSAGEM do dia anterior (referente aos alfajores cobertos hoje).</p>';
    h+='<div class="weight-grid">';
    h+='<div class="weight-card sobre"><div class="weight-card-title">Sobrepeso · embalagem</div><div class="weight-card-val" style="color:#7C3AED">'+totalSobr+' kg</div><div class="weight-card-sub">Pesagens FINAL no período</div></div>';
    h+='<div class="weight-card dose"><div class="weight-card-title">Sobredosagem · processo</div><div class="weight-card-val" style="color:#EA580C">'+totalSobreDose+' kg</div><div class="weight-card-sub">Pesagens da dosagem (D-anterior referenciado)</div></div>';
    h+='</div>';
    // gap
    const dif=+(totalSobr-totalSobreDose).toFixed(2);
    h+='<div style="margin-top:10px;padding:10px;background:var(--lg);border-radius:10px;font-size:11px;font-family:\'DM Mono\'"><strong>Δ:</strong> '+(dif>0?'+':'')+dif+' kg · ';
    if(Math.abs(dif)<0.5)h+='Dosagem e embalagem coerentes.';
    else if(dif>0)h+='Embalagem está mais pesada que a dosagem indicava — possível ganho de massa entre etapas (cobertura excessiva, retenção).';
    else h+='Dosagem estava mais pesada que a embalagem mostra — possível perda entre etapas.';
    h+='</div></div>';
  }else{
    h+='<div class="section-card" style="background:#FEF9C3;border-color:#FCD34D"><div class="chart-title" style="color:#92400E">⚖️ Sobrepeso × Sobredosagem</div><p style="font-size:11px;color:#92400E;font-family:\'DM Mono\';margin-top:6px">Selecione uma linha específica para ver o detalhamento dosagem (D-1) × embalagem (D).</p></div>';
  }

  // OMIE — abs, %, trend
  const hasOmie=Math.abs(omieBisc)+Math.abs(omieRech)+Math.abs(omieCob)>0;
  if(hasOmie){
    h+='<div class="section-card"><div class="chart-title">📊 OMIE — Diferenças de Inventário Acumuladas</div>';
    h+='<p style="font-size:10px;color:var(--muted);font-family:\'DM Mono\';margin-top:4px">Diferença = físico − sistema. Negativo = faltou no físico (perda real). % calculado sobre os kg produzidos no período.</p>';
    [['Biscoito',omieBisc,'biscoito'],['Recheios',omieRech,'recheios'],['Coberturas',omieCob,'coberturas']].forEach(([lbl,val,key])=>{
      const pctV=totalKgProd>0?+((Math.abs(val)/totalKgProd)*100).toFixed(2):0;
      const valCol=val<0?'var(--red)':val>0?'var(--green)':'var(--muted)';
      h+='<div class="omie-comp-card"><div class="omie-comp-hdr"><span class="omie-comp-name">'+lbl+'</span></div>';
      h+='<div class="omie-row3">';
      h+='<div class="omie-stat"><div class="omie-stat-v" style="color:'+valCol+'">'+(val>0?'+':'')+val+' kg</div><div class="omie-stat-l">Valor absoluto</div></div>';
      h+='<div class="omie-stat"><div class="omie-stat-v" style="color:'+valCol+'">'+pctV+'%</div><div class="omie-stat-l">% da produção</div></div>';
      h+='<div class="omie-stat"><div class="omie-stat-v">📈</div><div class="omie-stat-l">Ver tendência ↓</div></div>';
      h+='</div>';
      h+='<canvas id="omie-trend-'+key+'" style="max-height:160px;margin-top:8px"></canvas>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Tendência geral perdas
  h+='<div class="section-card"><div class="chart-title">📉 Tendência de Perdas no Período</div>';
  h+='<canvas id="trend-loss" style="max-height:280px"></canvas></div>';

  // Decomposição por linha
  if(fLine==='ALL'){
    h+='<div class="section-card"><div class="chart-title">🏭 Perdas por Linha</div>';
    h+='<canvas id="by-line" style="max-height:240px"></canvas></div>';
  }

  // Top SKUs com mais perdas (calculado pelo sobrepeso)
  if(datas.length){
    h+='<div class="section-card"><div class="chart-title">🔝 Comentários sobre Perdas</div>';
    const comentarios=flt.filter(e=>e.comentarioPerdas).slice(0,15);
    if(comentarios.length){comentarios.forEach(e=>{h+='<div style="padding:8px 10px;border-left:2px solid var(--yellow);background:var(--lg);border-radius:6px;font-size:11px;margin-bottom:6px">📅 <strong>'+new Date(e.data+'T12:00').toLocaleDateString('pt-BR')+'</strong> · '+e.linha+' · '+e.turno+' · '+e.supervisor+'<div style="margin-top:4px;color:var(--muted);font-style:italic">"'+e.comentarioPerdas+'"</div></div>';});}
    else h+='<p style="font-size:11px;color:var(--muted);font-family:\'DM Mono\';font-style:italic">Sem comentários no período</p>';
    h+='</div>';
  }

  document.getElementById('body').innerHTML=h;

  // Charts
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  const cf={family:'DM Mono',size:8};

  // Trend de perdas (varredura, sobrepeso, BOPP por dia)
  const grouped={};datas.forEach(dt=>{
    let v=0,sb=0,bp=0;
    flt.filter(e=>e.data===dt).forEach(e=>{v+=(e.perdaVarreduraKg||((e.perdaVarrDosKg||0)+(e.perdaVarrCobKg||0)+(e.perdaVarrBiscKg||0)));bp+=(e.perdaBoppKg||0);});
    lines.forEach(ln=>{sb+=sobrepesoData(dt,ln);});
    grouped[dt]={varr:+v.toFixed(1),sobr:+sb.toFixed(1),bopp:+bp.toFixed(1)};
  });
  const lblTrend=datas.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));
  const cTrend=document.getElementById('trend-loss');
  if(cTrend){
    charts.trend=new Chart(cTrend,{type:'bar',data:{labels:lblTrend,datasets:[
      {label:'Varredura',data:datas.map(d=>grouped[d].varr),backgroundColor:'#F59E0BAA',borderRadius:2},
      {label:'Sobrepeso',data:datas.map(d=>grouped[d].sobr),backgroundColor:'#7C3AEDAA',borderRadius:2},
      {label:'BOPP',data:datas.map(d=>grouped[d].bopp),backgroundColor:'#14B8A6AA',borderRadius:2}
    ]},options:{plugins:{legend:{labels:{font:cf}}},scales:{x:{stacked:true,ticks:{font:cf}},y:{stacked:true,ticks:{font:cf}}},maintainAspectRatio:true}});
  }

  // Por linha
  if(fLine==='ALL'){
    const cBL=document.getElementById('by-line');
    const byLn={L1:{varr:0,sobr:0,bopp:0,quebra:0,rej:0},L2:{varr:0,sobr:0,bopp:0,quebra:0,rej:0},L3:{varr:0,sobr:0,bopp:0,quebra:0,rej:0}};
    flt.forEach(e=>{const ln=e.linha;if(!byLn[ln])return;byLn[ln].varr+=(e.perdaVarreduraKg||((e.perdaVarrDosKg||0)+(e.perdaVarrCobKg||0)+(e.perdaVarrBiscKg||0)));byLn[ln].bopp+=(e.perdaBoppKg||0);byLn[ln].quebra+=(e.perdaQuebraFornecKg||0);byLn[ln].rej+=(e.perdaRejeitoDosKg||0);});
    datas.forEach(dt=>{['L1','L2','L3'].forEach(ln=>{byLn[ln].sobr+=sobrepesoData(dt,ln);});});
    if(cBL){
      charts.byLine=new Chart(cBL,{type:'bar',data:{labels:['L1','L2','L3'],datasets:[
        {label:'Varredura',data:['L1','L2','L3'].map(l=>+byLn[l].varr.toFixed(1)),backgroundColor:'#F59E0BAA'},
        {label:'Sobrepeso',data:['L1','L2','L3'].map(l=>+byLn[l].sobr.toFixed(1)),backgroundColor:'#7C3AEDAA'},
        {label:'Quebra Fornec.',data:['L1','L2','L3'].map(l=>+byLn[l].quebra.toFixed(1)),backgroundColor:'#DC2626AA'},
        {label:'Rejeito Dos.',data:['L1','L2','L3'].map(l=>+byLn[l].rej.toFixed(1)),backgroundColor:'#7C3AEDAA'},
        {label:'BOPP',data:['L1','L2','L3'].map(l=>+byLn[l].bopp.toFixed(1)),backgroundColor:'#14B8A6AA'}
      ]},options:{plugins:{legend:{labels:{font:cf}}},scales:{x:{stacked:true,ticks:{font:cf}},y:{stacked:true,ticks:{font:cf}}},maintainAspectRatio:true}});
    }
  }

  // OMIE trends por componente
  if(hasOmie){
    [['biscoito','omieBiscoitoKg','#F59E0B'],['recheios','omieRecheiosKg','#7C3AED'],['coberturas','omieCoberturasKg','#14B8A6']].forEach(([k,key,col])=>{
      const cv=document.getElementById('omie-trend-'+k);if(!cv)return;
      const dailyV=datas.map(dt=>{const dEs=flt.filter(e=>e.data===dt);return +dEs.reduce((s,e)=>s+(e[key]||0),0).toFixed(1);});
      charts['omie_'+k]=new Chart(cv,{type:'line',data:{labels:lblTrend,datasets:[{label:k,data:dailyV,borderColor:col,backgroundColor:col+'22',borderWidth:2,fill:true,tension:0.3,pointRadius:2}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{font:cf}},y:{ticks:{font:cf}}},maintainAspectRatio:true}});
    });
  }
}

renderNav('perdas');loadAll();
</script>
