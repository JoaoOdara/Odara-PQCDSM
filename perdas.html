.top-rank{font-family:'Bebas Neue';font-size:18px;color:var(--muted);min-width:24px;text-align:center}
.top-rank.r1{color:#DC2626}.top-rank.r2{color:#EA580C}.top-rank.r3{color:#D97706}
.top-bar{flex:1;height:18px;background:var(--white);border-radius:9px;overflow:hidden;position:relative}
.top-bar-fill{height:100%;background:linear-gradient(90deg,#DC2626,#F59E0B);border-radius:9px}
.top-info{flex:1;font-size:11px;font-family:'DM Mono';font-weight:600}

.date-input{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:11px;font-family:'DM Mono';background:var(--white)}

<body>
<div class="hdr"><div class="logo"><div class="logo-bar"></div><div><span class="logo-title">ODARA</span><span class="logo-tag">PERDAS</span></div></div><div class="hdr-right"><span class="hdr-cnt" id="hdr-cnt">—</span></div></div>
<div class="nav-bar" id="main-nav"></div>
<div style="background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:100">
  <span class="fl" style="margin:0">Período</span>
  <div style="display:flex;gap:4px" id="period-pills">
    <button class="pill" onclick="setPeriod('hoje',this)">Hoje</button>
    <button class="pill active" onclick="setPeriod('semana',this)">7d</button>
    <button class="pill" onclick="setPeriod('mes',this)">30d</button>
    <button class="pill" onclick="setPeriod('trim',this)">90d</button>
    <button class="pill" onclick="setPeriod('ano',this)">365d</button>
    <button class="pill" onclick="setPeriod('custom',this)">Custom</button>
  </div>
  <div id="custom-range" style="display:none;align-items:center;gap:6px">
    <span style="font-size:10px;color:var(--muted);font-family:'DM Mono'">de</span>
    <input id="d-from" class="date-input" type="date" onchange="onCustomDate()"/>
    <span style="font-size:10px;color:var(--muted);font-family:'DM Mono'">até</span>
    <input id="d-to" class="date-input" type="date" onchange="onCustomDate()"/>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span class="fl" style="margin:0">Linha</span>
  <div style="display:flex;gap:4px" id="line-pills">
    <button class="pill active" onclick="setLine('ALL',this)">Todas</button>
    <button class="pill" onclick="setLine('L1',this)">L1</button>
    <button class="pill" onclick="setLine('L2',this)">L2</button>
    <button class="pill" onclick="setLine('L3',this)">L3</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span class="fl" style="margin:0">Turno</span>
  <div style="display:flex;gap:4px" id="turno-pills">
    <button class="pill active" onclick="setTurno('ALL',this)">Todos</button>
    <button class="pill" onclick="setTurno('T1',this)">T1</button>
    <button class="pill" onclick="setTurno('T2',this)">T2</button>
    <button class="pill" onclick="setTurno('T3',this)">T3</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span style="font-size:10px;color:var(--blue);font-family:'DM Mono';cursor:pointer" onclick="loadAll()">↻ atualizar</span>
</div>
<div class="content" id="body"></div>
<div class="footer"><span>ODARA · PQCDSM v12.1 · Perdas</span><span></span></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
if(!checkAuth())throw new Error('not auth');

let allEntries=[],pesagensTodas=[];
let period='semana',fLine='ALL',fTurno='ALL';
let customFrom=null,customTo=null;
let charts={};

function setPeriod(p,el){
  period=p;
  document.querySelectorAll('#period-pills .pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  const cr=document.getElementById('custom-range');
  if(p==='custom'){
    cr.style.display='flex';
    if(!customFrom){const d=new Date();d.setDate(d.getDate()-7);customFrom=d.toISOString().slice(0,10);document.getElementById('d-from').value=customFrom;}
    if(!customTo){customTo=today();document.getElementById('d-to').value=customTo;}
  }else{cr.style.display='none';}
  render();
}
function onCustomDate(){customFrom=document.getElementById('d-from').value;customTo=document.getElementById('d-to').value;if(customFrom&&customTo)render();}
function setLine(l,el){fLine=l;document.querySelectorAll('#line-pills .pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setTurno(t,el){fTurno=t;document.querySelectorAll('#turno-pills .pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}

async function loadAll(){
  document.getElementById('hdr-cnt').textContent='carregando…';
  try{
    await sbGetConfig();
    allEntries=(await sbQuery('pqcdsm','select=*&order=data.desc&limit=2000')).map(norm);
    const cut=new Date();cut.setDate(cut.getDate()-400);
    pesagensTodas=await sbQuery('pesagens','select=*&data=gte.'+cut.toISOString().slice(0,10));
    document.getElementById('hdr-cnt').textContent=allEntries.length+' reg';
  }catch(e){showToast('❌ '+e.message,'err');}
  render();
}

function getRange(){
  if(period==='custom'){return{cut:customFrom||today(),ref:customTo||today()};}
  const ref=new Date();const cut=new Date(ref);
  if(period==='hoje')cut.setDate(cut.getDate());
  else if(period==='semana')cut.setDate(cut.getDate()-7);
  else if(period==='mes')cut.setDate(cut.getDate()-30);
  else if(period==='trim')cut.setDate(cut.getDate()-90);
  else cut.setDate(cut.getDate()-365);
  return{cut:cut.toISOString().slice(0,10),ref:ref.toISOString().slice(0,10)};
}

function getFiltered(){
  const{cut,ref}=getRange();
  let d=activeEntries(allEntries).filter(e=>e.data>=cut&&e.data<=ref);
  if(fLine!=='ALL')d=d.filter(e=>e.linha===fLine);
  if(fTurno!=='ALL')d=d.filter(e=>e.turno===fTurno);
  return d;
}

// ══ Proporções B/R/C por categoria ══
const PROPORCOES_MIX={
  tradicional:{dos:{B:0.250,R:0.750},  cob:{B:0.197,R:0.588,C:0.215}},
  mini:       {dos:{B:0.200,R:0.800},  cob:{B:0.160,R:0.640,C:0.200}},
  zero:       {dos:{B:0.303,R:0.697},  cob:{B:0.222,R:0.511,C:0.266}},
  crocante:   {dos:{B:0.357,R:0.643},  cob:{B:0.250,R:0.450,C:0.300}},
  peanut:     {dos:{B:0.455,R:0.545},  cob:{B:0.285,R:0.343,C:0.372}}
};
function classifySku(cod,desc){
  const c=(cod||'').toUpperCase(),d=(desc||'').toUpperCase();
  if(c==='PP29001'||c==='PP30001'||d.includes('ZERO'))return{mix:'zero',rec:'dl_zero',cob:c==='PP30001'||d.includes('BRANCO')?'branca':'escura',bisc:'zero_peanut'};
  if(c.startsWith('PP03')||d.includes('MINI'))return{mix:'mini',rec:'dl_normal',cob:'escura',bisc:'mini'};
  if(c.startsWith('PP12')||c.startsWith('PP13')||c.startsWith('PP14')||c.startsWith('PP15')||c.startsWith('PP21')||c.startsWith('PP22')||c.startsWith('PP23')||d.includes('PEANUT')){
    const isBranca=d.includes('BRANCO')||c==='PP14001'||c==='PP23001';
    return{mix:'peanut',rec:'peanut',cob:isBranca?'branca':'peanut_esc',bisc:'zero_peanut'};
  }
  if(c.startsWith('PP18')||c.startsWith('PP19')||c.startsWith('PP20')||c.startsWith('PP24')||c.startsWith('PP26')||c.startsWith('PP27')||d.includes('CROCANTE')){
    const isBranca=d.includes('MILK')||d.includes('BRANCO')||d.includes('NEGRESCO')||d.includes('GALAK');
    return{mix:'crocante',rec:'crocante',cob:isBranca?'branca':'escura',bisc:'crocante'};
  }
  const isBranca=d.includes('BRANCO')||c==='PP02001'||c==='PP10001';
  return{mix:'tradicional',rec:'dl_normal',cob:isBranca?'branca':'escura',bisc:'tradicional'};
}
function calcMixLinha(flt,linha){
  let dosKg={B:0,R:0,total:0};
  let cobKg={B:0,R:0,C:0,total:0};
  flt.filter(e=>linha==='ALL'||e.linha===linha).forEach(e=>{
    (e.dosagens||[]).forEach(d=>{
      const kg=(d.real||0)*(d.gram||0)/1000;
      const cls=classifySku(d.sku||'',d.desc||'');
      const p=PROPORCOES_MIX[cls.mix].dos;
      dosKg.B+=kg*p.B;dosKg.R+=kg*p.R;dosKg.total+=kg;
    });
    const embs=(e.embalagens&&e.embalagens.length)?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');
    embs.forEach(em=>{
      const kg=(em.real||0)*(em.gram||0)/1000;
      const cls=classifySku(em.sku||'',em.desc||'');
      const p=PROPORCOES_MIX[cls.mix].cob;
      cobKg.B+=kg*p.B;cobKg.R+=kg*p.R;cobKg.C+=kg*p.C;cobKg.total+=kg;
    });
  });
  return{
    dos:dosKg.total>0?{B:dosKg.B/dosKg.total,R:dosKg.R/dosKg.total}:{B:0,R:0},
    cob:cobKg.total>0?{B:cobKg.B/cobKg.total,R:cobKg.R/cobKg.total,C:cobKg.C/cobKg.total}:{B:0,R:0,C:0},
    dosKg,cobKg
  };
}
function calcConsumoPorLinha(flt){
  const consumo={};
  const ensure=(g,ln)=>{if(!consumo[g])consumo[g]={};if(!consumo[g][ln])consumo[g][ln]=0;};
  flt.forEach(e=>{
    const ln=e.linha;
    (e.dosagens||[]).forEach(d=>{
      const kg=(d.real||0)*(d.gram||0)/1000;
      const cls=classifySku(d.sku||'',d.desc||'');
      const pd=PROPORCOES_MIX[cls.mix].dos;
      ensure('bisc_'+cls.bisc,ln);consumo['bisc_'+cls.bisc][ln]+=kg*pd.B;
      ensure('rec_'+cls.rec,ln);consumo['rec_'+cls.rec][ln]+=kg*pd.R;
    });
    const embs=(e.embalagens&&e.embalagens.length)?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');
    embs.forEach(em=>{
      const kg=(em.real||0)*(em.gram||0)/1000;
      const cls=classifySku(em.sku||'',em.desc||'');
      const pc=PROPORCOES_MIX[cls.mix].cob;
      ensure('cob_'+cls.cob,ln);consumo['cob_'+cls.cob][ln]+=kg*pc.C;
    });
  });
  return consumo;
}

function sobrepesoData(dt,linha){
  const lnP=pesagensTodas.filter(p=>p.linha===linha&&p.data===dt&&p.ponto==='final');
  if(!lnP.length)return 0;
  const bySku={};
  lnP.forEach(p=>{const k=p.sku+'||'+p.sku_gram;if(!bySku[k])bySku[k]={gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>bySku[k].weights.push(v));});
  let tot=0;
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===dt&&e.linha===linha);
  Object.entries(bySku).forEach(([k,sk])=>{
    if(!sk.weights.length)return;
    const mean=sk.weights.reduce((a,b)=>a+b,0)/sk.weights.length;
    const overPct=mean>sk.gram?(mean-sk.gram)/sk.gram:0;
    let alfSku=0;
    lnEntries.forEach(e=>{const sp=e.embalagens&&e.embalagens.length?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');if(sp&&sp.length)sp.forEach(s=>{if(s.sku===k.split('||')[0])alfSku+=(s.real||0);});});
    if(!alfSku){alfSku=lnEntries.reduce((s,e)=>s+(e.realUnid||0),0);}
    tot+=(overPct*alfSku*sk.gram)/1000;
  });
  return +tot.toFixed(2);
}

function sobredosagemData(dt,linha){
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===dt&&e.linha===linha);
  let tot=0;
  lnEntries.forEach(e=>{
    const embs=e.embalagens||[];
    embs.forEach(emb=>{
      const dataDose=emb.dataDosagem;if(!dataDose)return;
      const ps=pesagensTodas.filter(p=>p.linha===linha&&p.data===dataDose&&p.sku===emb.sku);
      if(!ps.length)return;
      const weights=[];const gram=+emb.gram||0;
      ps.forEach(p=>[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>weights.push(v)));
      if(!weights.length||!gram)return;
      const mean=weights.reduce((a,b)=>a+b,0)/weights.length;
      const overPct=mean>gram?(mean-gram)/gram:0;
      tot+=(overPct*(emb.real||0)*gram)/1000;
    });
  });
  return +tot.toFixed(2);
}

function sobrepesoPorSkuLinha(dt,linha){
  const lnP=pesagensTodas.filter(p=>p.linha===linha&&p.data===dt&&p.ponto==='final');
  if(!lnP.length)return {};
  const bySku={};
  lnP.forEach(p=>{const k=p.sku;if(!bySku[k])bySku[k]={sku:p.sku,desc:p.sku_desc||'',gram:+p.sku_gram,weights:[]};[p.p1,p.p2,p.p3,p.p4,p.p5].filter(v=>v!=null).forEach(v=>bySku[k].weights.push(v));});
  const lnEntries=activeEntries(allEntries).filter(e=>e.data===dt&&e.linha===linha);
  const out={};
  Object.values(bySku).forEach(sk=>{
    if(!sk.weights.length)return;
    const mean=sk.weights.reduce((a,b)=>a+b,0)/sk.weights.length;
    const overPct=mean>sk.gram?(mean-sk.gram)/sk.gram:0;
    let alfSku=0;
    lnEntries.forEach(e=>{const sp=e.embalagens&&e.embalagens.length?e.embalagens:(e.skusProd||[]).filter(s=>s.tipo==='embalagem');if(sp&&sp.length)sp.forEach(s=>{if(s.sku===sk.sku)alfSku+=(s.real||0);});});
    out[sk.sku]={sku:sk.sku,desc:sk.desc,kg:+(overPct*alfSku*sk.gram/1000).toFixed(2),overPct:+(overPct*100).toFixed(2)};
  });
  return out;
}

function render(){
  const flt=getFiltered();
  const{cut,ref}=getRange();
  if(!flt.length){document.getElementById('body').innerHTML='<div class="empty" style="margin-top:20px"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700">Nenhum registro nesse filtro</div><div style="font-size:11px;color:var(--muted);margin-top:6px">'+cut+' → '+ref+'</div></div>';return;}

  const lines=fLine==='ALL'?['L1','L2','L3']:[fLine];

  // ══ MP pura (antes da dosagem) ══
  const totalQuebra=+flt.reduce((s,e)=>s+(e.perdaQuebraFornecKg||0),0).toFixed(1);
  const totalVarrBisc=+flt.reduce((s,e)=>s+(e.perdaVarrBiscKg||0),0).toFixed(1);
  const totalRejeito=+flt.reduce((s,e)=>s+(e.perdaRejeitoDosKg||0),0).toFixed(1);
  // ══ Produto pós-dosagem ══
  const totalVarrDos=+flt.reduce((s,e)=>s+(e.perdaVarrDosKg||0),0).toFixed(1);
  const totalVarrCob=+flt.reduce((s,e)=>s+(e.perdaVarrCobKg||0),0).toFixed(1);
  // ══ Embalagem ══
  const totalBopp=+flt.reduce((s,e)=>s+(e.perdaBoppKg||0),0).toFixed(1);

  const datas=[...new Set(flt.map(e=>e.data))].sort();
  let totalSobr=0,totalSobreDose=0;
  datas.forEach(dt=>{lines.forEach(ln=>{totalSobr+=sobrepesoData(dt,ln);totalSobreDose+=sobredosagemData(dt,ln);});});
  totalSobr=+totalSobr.toFixed(2);totalSobreDose=+totalSobreDose.toFixed(2);

  const perdaMpKg=+(totalQuebra+totalVarrBisc+totalRejeito).toFixed(1);
  const perdaProdutoKg=+(totalVarrDos+totalVarrCob+totalSobr).toFixed(1);
  const perdaEmbKg=totalBopp;

  // Kg produzidos
  let totalKgProd=0,totalAlfEmb=0;
  flt.forEach(e=>{if(e.embalagens&&e.embalagens.length){e.embalagens.forEach(x=>{totalKgProd+=(x.real||0)*(x.gram||0)/1000;totalAlfEmb+=(x.real||0);});}else{const sp=e.skusProd&&e.skusProd.length?e.skusProd:[{real:e.realUnid,gram:e.skuGram}];sp.forEach(s=>{totalKgProd+=(s.real||0)*(s.gram||0)/1000;if(s.tipo!=='dosagem')totalAlfEmb+=(s.real||0);});}});
  totalKgProd=+totalKgProd.toFixed(1);

  const mpPct=totalKgProd>0?+((perdaMpKg/totalKgProd)*100).toFixed(2):0;
  const produtoPct=totalKgProd>0?+((perdaProdutoKg/totalKgProd)*100).toFixed(2):0;
  const embPct=totalKgProd>0?+((perdaEmbKg/totalKgProd)*100).toFixed(2):0;
  const sobrPct=totalKgProd>0?+((totalSobr/totalKgProd)*100).toFixed(2):0;

      ];
      h+='<table style="width:100%;margin-top:10px;font-size:10px;font-family:\'DM Mono\';border-collapse:collapse">';
      h+='<thead><tr style="border-bottom:2px solid var(--border)"><th style="text-align:left;padding:6px">Grupo de MP</th><th style="text-align:right;padding:6px">L1 (kg)</th><th style="text-align:right;padding:6px">L2 (kg)</th><th style="text-align:right;padding:6px">L3 (kg)</th><th style="text-align:right;padding:6px">Total</th><th style="text-align:right;padding:6px">L1%</th><th style="text-align:right;padding:6px">L2%</th><th style="text-align:right;padding:6px">L3%</th></tr></thead><tbody>';
      grupos.forEach(g=>{
        const c=consumo[g.k]||{};
        const l1=+(c.L1||0).toFixed(1),l2=+(c.L2||0).toFixed(1),l3=+(c.L3||0).toFixed(1);
        const tot=+(l1+l2+l3).toFixed(1);
        if(tot===0)return;
        const p1=tot>0?(l1/tot*100).toFixed(1):'0',p2=tot>0?(l2/tot*100).toFixed(1):'0',p3=tot>0?(l3/tot*100).toFixed(1):'0';
        h+='<tr style="border-bottom:1px dashed var(--border)"><td style="padding:6px">'+g.l+'</td>';
        h+='<td style="text-align:right;padding:6px;'+(l1>0?'font-weight:700':'color:var(--muted)')+'">'+(l1>0?l1:'—')+'</td>';
        h+='<td style="text-align:right;padding:6px;'+(l2>0?'font-weight:700':'color:var(--muted)')+'">'+(l2>0?l2:'—')+'</td>';
        h+='<td style="text-align:right;padding:6px;'+(l3>0?'font-weight:700':'color:var(--muted)')+'">'+(l3>0?l3:'—')+'</td>';
        h+='<td style="text-align:right;padding:6px;color:var(--ink);font-weight:700">'+tot+'</td>';
        h+='<td style="text-align:right;padding:6px;color:var(--muted);font-size:9px">'+(l1>0?p1+'%':'—')+'</td>';
        h+='<td style="text-align:right;padding:6px;color:var(--muted);font-size:9px">'+(l2>0?p2+'%':'—')+'</td>';
        h+='<td style="text-align:right;padding:6px;color:var(--muted);font-size:9px">'+(l3>0?p3+'%':'—')+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table>';
      h+='</div>';
    }
  }

  h+='<div class="section-card"><div class="chart-title">📉 Tendência de Perdas no Período</div>';
  h+='<canvas id="trend-loss" style="max-height:280px"></canvas></div>';
  h+='<div class="section-card"><div class="chart-title">📊 % Perda sobre Produção (diário · MP+Produto)</div>';
  h+='<canvas id="trend-pct" style="max-height:240px"></canvas></div>';

  if(fLine==='ALL'){
    h+='<div class="section-card"><div class="chart-title">🏭 Perdas por Linha</div>';
    h+='<canvas id="by-line" style="max-height:240px"></canvas></div>';
  }

  if(datas.length){
    h+='<div class="section-card"><div class="chart-title">💬 Comentários sobre Perdas no Período</div>';
    const comentarios=flt.filter(e=>e.comentarioPerdas).slice(0,15);
    if(comentarios.length){comentarios.forEach(e=>{h+='<div style="padding:8px 10px;border-left:2px solid var(--yellow);background:var(--lg);border-radius:6px;font-size:11px;margin-bottom:6px">📅 <strong>'+new Date(e.data+'T12:00').toLocaleDateString('pt-BR')+'</strong> · '+e.linha+' · '+e.turno+' · '+e.supervisor+'<div style="margin-top:4px;color:var(--muted);font-style:italic">"'+e.comentarioPerdas+'"</div></div>';});}
    else h+='<p style="font-size:11px;color:var(--muted);font-family:\'DM Mono\';font-style:italic">Sem comentários no período</p>';
    h+='</div>';
  }

  document.getElementById('body').innerHTML=h;

  // Charts
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  const cf={family:'DM Mono',size:8};
  const lblTrend=datas.map(d=>new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}));

  const cTrend=document.getElementById('trend-loss');
  if(cTrend){
    charts.trend=new Chart(cTrend,{type:'bar',data:{labels:lblTrend,datasets:[
      {label:'A · Matéria-Prima',data:datas.map(d=>dailyLosses[d].mp),backgroundColor:'#F59E0BAA',borderRadius:2},
      {label:'B · Produto pós-dosagem',data:datas.map(d=>dailyLosses[d].prod),backgroundColor:'#7C3AEDAA',borderRadius:2},
      {label:'C · Embalagem',data:datas.map(d=>dailyLosses[d].bopp),backgroundColor:'#14B8A6AA',borderRadius:2}
    ]},options:{plugins:{legend:{labels:{font:cf}}},scales:{x:{stacked:true,ticks:{font:cf}},y:{stacked:true,ticks:{font:cf}}},maintainAspectRatio:true}});
  }

  const cPct=document.getElementById('trend-pct');
  if(cPct){
    const pctSeries=datas.map(d=>dailyLosses[d].pct||0);
    charts.pct=new Chart(cPct,{type:'line',data:{labels:lblTrend,datasets:[{label:'% Perda/Produção',data:pctSeries,borderColor:'#DC2626',backgroundColor:'#DC262633',borderWidth:2,fill:true,tension:0.3,pointRadius:3},{type:'line',label:'Atenção (3%)',data:Array(pctSeries.length).fill(3),borderColor:'#F59E0B',borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false},{type:'line',label:'Crítico (5%)',data:Array(pctSeries.length).fill(5),borderColor:'#DC2626',borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false}]},options:{plugins:{legend:{labels:{font:cf}}},scales:{x:{ticks:{font:cf}},y:{ticks:{font:cf}}},maintainAspectRatio:true}});
  }

  if(fLine==='ALL'){
    const cBL=document.getElementById('by-line');
    const byLn={L1:{mp:0,prod:0,bopp:0},L2:{mp:0,prod:0,bopp:0},L3:{mp:0,prod:0,bopp:0}};
    flt.forEach(e=>{const ln=e.linha;if(!byLn[ln])return;byLn[ln].mp+=(e.perdaQuebraFornecKg||0)+(e.perdaVarrBiscKg||0)+(e.perdaRejeitoDosKg||0);byLn[ln].prod+=(e.perdaVarrDosKg||0)+(e.perdaVarrCobKg||0);byLn[ln].bopp+=(e.perdaBoppKg||0);});
    datas.forEach(dt=>{['L1','L2','L3'].forEach(ln=>{byLn[ln].prod+=sobrepesoData(dt,ln);});});
    if(cBL){
      charts.byLine=new Chart(cBL,{type:'bar',data:{labels:['L1','L2','L3'],datasets:[
        {label:'A · MP',data:['L1','L2','L3'].map(l=>+byLn[l].mp.toFixed(1)),backgroundColor:'#F59E0BAA'},
        {label:'B · Produto',data:['L1','L2','L3'].map(l=>+byLn[l].prod.toFixed(1)),backgroundColor:'#7C3AEDAA'},
        {label:'C · BOPP',data:['L1','L2','L3'].map(l=>+byLn[l].bopp.toFixed(1)),backgroundColor:'#14B8A6AA'}
      ]},options:{plugins:{legend:{labels:{font:cf}}},scales:{x:{stacked:true,ticks:{font:cf}},y:{stacked:true,ticks:{font:cf}}},maintainAspectRatio:true}});
    }
  }

  if(hasOmie){
    [['biscoito','omieBiscoitoKg','#F59E0B'],['recheios','omieRecheiosKg','#7C3AED'],['coberturas','omieCoberturasKg','#14B8A6']].forEach(([k,key,col])=>{
      const cv=document.getElementById('omie-trend-'+k);if(!cv)return;
      const dailyV=datas.map(dt=>{const dEs=flt.filter(e=>e.data===dt);return +dEs.reduce((s,e)=>s+(e[key]||0),0).toFixed(1);});
      charts['omie_'+k]=new Chart(cv,{type:'line',data:{labels:lblTrend,datasets:[{label:k,data:dailyV,borderColor:col,backgroundColor:col+'22',borderWidth:2,fill:true,tension:0.3,pointRadius:2}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{font:cf}},y:{ticks:{font:cf}}},maintainAspectRatio:true}});
    });
  }
}

renderNav('perdas');loadAll();
</script>
</body>
</html>
