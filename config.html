<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Odara · Configurações</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/><link rel="stylesheet" href="shared.css"/></head><body>
<div class="hdr"><div class="logo"><div class="logo-bar"></div><div><span class="logo-title">ODARA</span><span class="logo-tag">CONFIGURAÇÕES</span></div></div></div>
<div class="nav-bar" id="main-nav"></div>
<div class="content">
  <div class="form-section"><div class="fsec-hdr"><div class="fsec-bar" style="background:var(--yellow)"></div><span class="fsec-title">METAS DOS INDICADORES</span></div>
    <div class="fg"><div><label class="fl">P — Produção (%)</label><input id="m-p" class="fi" type="number" value="95"/></div><div><label class="fl">Q — NCs máx/dia</label><input id="m-q" class="fi" type="number" value="3"/></div><div><label class="fl">S — Eventos máx</label><input id="m-s" class="fi" type="number" value="0"/></div><div><label class="fl">M — Presença (%)</label><input id="m-m" class="fi" type="number" value="95"/></div><div><label class="fl">PAD — Padrões (%)</label><input id="m-pad" class="fi" type="number" value="90"/></div></div>
  </div>
  <div class="form-section"><div class="fsec-hdr"><div class="fsec-bar" style="background:var(--red)"></div><span class="fsec-title">CUSTOS (R$/kg ou R$/un)</span></div>
    <div class="fg"><div><label class="fl">Biscoito (R$/kg)</label><input id="c-bisc" class="fi" type="number" step="0.01" value="15"/></div><div><label class="fl">Doce de leite (R$/kg)</label><input id="c-dl" class="fi" type="number" step="0.01" value="15"/></div><div><label class="fl">Chocolate (R$/kg)</label><input id="c-cho" class="fi" type="number" step="0.01" value="25"/></div><div><label class="fl">Embalagem (R$/un)</label><input id="c-emb" class="fi" type="number" step="0.01" value="0.50"/></div></div>
  </div>
  <div class="form-section"><div class="fsec-hdr"><div class="fsec-bar" style="background:var(--teal)"></div><span class="fsec-title">TARGETS DE PESO — PROCESSO</span></div>
    <p style="font-size:10px;color:var(--muted);margin-bottom:10px">Peso alvo para 3 biscoitos e dosado por tipo de produto (gramas)</p>
    <div class="fg4"><div><label class="fl">Tipo</label></div><div><label class="fl">Biscoito 3un (g)</label></div><div><label class="fl">Dosado (g)</label></div><div></div></div>
    <div id="targets-list"></div>
  </div>
  <div class="form-section"><div class="fsec-hdr"><div class="fsec-bar" style="background:var(--blue)"></div><span class="fsec-title">EQUIPE — REUNIÃO DIÁRIA DE GESTÃO</span></div>
    <div class="fg"><div><label class="fl">Qualidade</label><textarea id="eq-qual" class="fi" placeholder="Um nome por linha"></textarea></div><div><label class="fl">Manutenção</label><textarea id="eq-man" class="fi" placeholder="Um nome por linha"></textarea></div><div><label class="fl">Produção</label><textarea id="eq-prod" class="fi" placeholder="Um nome por linha"></textarea></div><div><label class="fl">PCP</label><textarea id="eq-pcp" class="fi" placeholder="Um nome por linha"></textarea></div><div><label class="fl">Almoxarifado</label><textarea id="eq-alm" class="fi" placeholder="Um nome por linha"></textarea></div></div>
  </div>
  <button class="save-btn" onclick="saveConfig()">💾 Salvar Configurações</button>
</div>
<div class="footer"><span>ODARA · PQCDSM v9 · Config</span><span></span></div>
<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
const TIPOS=['classico','mini','zero','crocante'];
let configRows=[];
async function loadConfig(){
  try{
    configRows=await sbQuery('config','select=*');
    const metas=configRows.find(r=>r.chave==='metas');if(metas&&metas.valor){document.getElementById('m-p').value=metas.valor.P||95;document.getElementById('m-q').value=metas.valor.Q||3;document.getElementById('m-s').value=metas.valor.S||0;document.getElementById('m-m').value=metas.valor.M||95;document.getElementById('m-pad').value=metas.valor.PAD||90;}
    const custos=configRows.find(r=>r.chave==='custos');if(custos&&custos.valor){document.getElementById('c-bisc').value=custos.valor.biscoito_kg||15;document.getElementById('c-dl').value=custos.valor.dl_kg||15;document.getElementById('c-cho').value=custos.valor.chocolate_kg||25;document.getElementById('c-emb').value=custos.valor.embalagem_un||0.5;}
    const targets=configRows.find(r=>r.chave==='targets_peso');renderTargets(targets?targets.valor:{});
    const pessoas=configRows.find(r=>r.chave==='pessoas');if(pessoas&&pessoas.valor){['qualidade','manutencao','producao','pcp','almoxarifado'].forEach(a=>{const el=document.getElementById('eq-'+a.slice(0,4).replace('manu','man'));if(el&&pessoas.valor[a])el.value=(pessoas.valor[a]||[]).join('\n');});}
  }catch(e){showToast('❌ '+e.message,'err');}
}
function renderTargets(t){document.getElementById('targets-list').innerHTML=TIPOS.map(tp=>{const d=t[tp]||{};return '<div class="fg4" style="margin-bottom:6px"><div style="font-size:12px;font-weight:700;padding-top:8px">'+tp+'</div><div><input class="fi" type="number" step="0.1" id="tw-b-'+tp+'" value="'+(d.biscoito_3un||0)+'"/></div><div><input class="fi" type="number" step="0.1" id="tw-d-'+tp+'" value="'+(d.dosado||0)+'"/></div><div></div></div>';}).join('');}
async function saveConfig(){
  const metas={P:+document.getElementById('m-p').value,Q:+document.getElementById('m-q').value,S:+document.getElementById('m-s').value,M:+document.getElementById('m-m').value,PAD:+document.getElementById('m-pad').value};
  const custos={biscoito_kg:+document.getElementById('c-bisc').value,dl_kg:+document.getElementById('c-dl').value,chocolate_kg:+document.getElementById('c-cho').value,embalagem_un:+document.getElementById('c-emb').value};
  const targets={};TIPOS.forEach(tp=>{targets[tp]={biscoito_3un:+document.getElementById('tw-b-'+tp).value,dosado:+document.getElementById('tw-d-'+tp).value};});
  const pessoas={qualidade:document.getElementById('eq-qual').value.split('\n').filter(Boolean),manutencao:document.getElementById('eq-man').value.split('\n').filter(Boolean),producao:document.getElementById('eq-prod').value.split('\n').filter(Boolean),pcp:document.getElementById('eq-pcp').value.split('\n').filter(Boolean),almoxarifado:document.getElementById('eq-alm').value.split('\n').filter(Boolean)};
  try{
    for(const[chave,valor]of[['metas',metas],['custos',custos],['targets_peso',targets],['pessoas',pessoas]]){
      const existing=configRows.find(r=>r.chave===chave);
      if(existing)await sbUpdate('config',existing.id,{valor,updated_at:new Date().toISOString()});
      else await sbInsert('config',{chave,valor});
    }
    showToast('✅ Configurações salvas','ok');
  }catch(e){showToast('❌ '+e.message,'err');}
}
renderNav('config');loadConfig();
</script></body></html>
